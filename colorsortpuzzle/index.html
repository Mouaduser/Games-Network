<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Color Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  background: #0e0e12;
  color: #e8e8f0;
  font-family: 'Space Mono', monospace;
  overflow: hidden;        /* prevent scroll bouncing on iOS */
  overscroll-behavior: none;
}

/* dot-grid background */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(#2a2a3a 1px, transparent 1px),
    linear-gradient(90deg, #2a2a3a 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.3;
}

/* ============================================================
   SCREENS  –  only one visible at a time
============================================================ */
.screen {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 12px)
           env(safe-area-inset-bottom, 12px) env(safe-area-inset-left, 12px);
  overflow: hidden;
}
.screen.hidden { display: none !important; }

/* ============================================================
   LANDING SCREEN
============================================================ */
#screen-landing { text-align: center; gap: 0; }

.landing-logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.8rem, 13vw, 5.5rem);
  font-weight: 900; letter-spacing: -3px; line-height: 1;
  background: linear-gradient(135deg, #f0e040 0%, #ff6b9d 50%, #40c4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: slideUp .6s ease both;
}
.landing-sub {
  margin-top: 8px; color: #6b6b80;
  font-size: clamp(0.58rem, 2.4vw, 0.75rem);
  letter-spacing: 3px; text-transform: uppercase;
  animation: slideUp .6s .08s ease both;
}

/* preview tubes */
.preview-tubes {
  display: flex; gap: 10px; justify-content: center;
  margin: 28px 0 24px;
  animation: slideUp .6s .16s ease both;
}
.ptube {
  width: 34px; height: 110px;
  background: #16161e; border: 2px solid #2a2a3a;
  border-radius: 0 0 18px 18px; border-top: none;
  display: flex; flex-direction: column-reverse;
  overflow: hidden; position: relative;
}
.ptube::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:#2a2a3a; z-index:2; }
.pblock { width:100%; flex:1; }

/* difficulty selector on landing */
.land-diff {
  display: flex; gap: 8px; margin-bottom: 22px;
  animation: slideUp .6s .24s ease both;
}
.land-diff button {
  font-family: 'Space Mono', monospace;
  font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 7px 18px; border-radius: 100px;
  border: 1px solid #2a2a3a; background: transparent; color: #6b6b80;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: all .2s;
}
.land-diff button.active,
.land-diff button:hover { background: #f0e040; color: #1a1a00; border-color: #f0e040; font-weight: 700; }

/* CTA buttons */
.land-btns {
  display: flex; flex-direction: column; gap: 10px; align-items: center;
  animation: slideUp .6s .32s ease both;
}
#btn-start {
  font-family: 'Syne', sans-serif;
  font-size: clamp(.95rem, 4vw, 1.15rem); font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  background: #f0e040; color: #1a1a00;
  border: none; border-radius: 12px; padding: 15px 52px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: transform .15s, box-shadow .15s;
}
#btn-start:active { transform: scale(.97); }
#btn-start:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,224,64,.35); }

#btn-continue {
  font-family: 'Space Mono', monospace;
  font-size: clamp(.68rem, 2.8vw, .82rem); letter-spacing: 1px; text-transform: uppercase;
  background: #16161e; color: #e8e8f0;
  border: 1px solid #2a2a3a; border-radius: 12px; padding: 12px 28px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, color .2s, transform .15s;
}
#btn-continue:active { transform: scale(.97); }
#btn-continue:hover  { border-color: #f0e040; color: #f0e040; transform: translateY(-2px); }

/* how-to */
.how-to {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  margin-top: 26px;
  animation: slideUp .6s .4s ease both;
}
.how-step {
  background: #16161e; border: 1px solid #2a2a3a;
  border-radius: 12px; padding: 11px 14px; max-width: 120px; text-align: center;
}
.how-step .icon { font-size: 1.4rem; margin-bottom: 5px; }
.how-step p { font-size: .58rem; color: #6b6b80; text-transform: uppercase; letter-spacing: 1px; line-height: 1.5; }

/* footer */
.land-footer {
  margin-top: 24px; color: #6b6b80;
  font-size: .58rem; letter-spacing: 1px; text-transform: uppercase;
  animation: slideUp .6s .48s ease both;
}
.land-footer a { color: #6b6b80; text-decoration: underline; text-underline-offset: 3px; }
.land-footer a:hover { color: #e8e8f0; }

.btn-games-network {
  position: absolute;
  top: max(env(safe-area-inset-top, 0px), 16px);
  left: 16px;
  font-family: 'Space Mono', monospace;
  font-size: .6rem; letter-spacing: 1px; text-transform: uppercase;
  color: #6b6b80; text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px;
  border: 1px solid #2a2a3a; border-radius: 8px;
  background: #16161e;
  transition: color .2s, border-color .2s;
  -webkit-tap-highlight-color: transparent;
  animation: slideUp .6s ease both;
}
.btn-games-network:hover { color: #f0e040; border-color: #f0e040; }

/* ============================================================
   GAME SCREEN
============================================================ */
#screen-game {
  justify-content: flex-start;
  padding-top: max(env(safe-area-inset-top, 0px), 8px);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px);
  gap: 0;
}

/* header row */
.game-header {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 12px 4px;
  flex-shrink: 0;
}
.game-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.1rem, 5vw, 1.7rem); font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(135deg, #f0e040, #ff6b9d, #40c4ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.btn-menu {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  letter-spacing: 1px; text-transform: uppercase;
  background: #16161e; color: #6b6b80;
  border: 1px solid #2a2a3a; border-radius: 7px;
  padding: 6px 12px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: color .15s, border-color .15s;
}
.btn-menu:hover { color: #e8e8f0; border-color: #444; }

/* stats bar */
.stats {
  width: 100%; display: flex; justify-content: center;
  gap: clamp(14px, 5vw, 36px);
  padding: 4px 12px 6px;
  flex-shrink: 0;
}
.stat { text-align: center; }
.stat-val {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1rem, 4vw, 1.5rem); font-weight: 800; color: #f0e040; line-height: 1;
}
.stat-lbl {
  font-size: clamp(.48rem, 1.7vw, .6rem); color: #6b6b80;
  text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;
}

/* difficulty row */
.diff-row {
  display: flex; gap: 6px; justify-content: center;
  padding: 2px 12px 4px;
  flex-shrink: 0;
}
.diff-row button {
  font-family: 'Space Mono', monospace;
  font-size: clamp(.5rem, 1.9vw, .62rem); letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 13px; border-radius: 100px;
  border: 1px solid #2a2a3a; background: transparent; color: #6b6b80;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .2s;
}
.diff-row button.active,
.diff-row button:hover { background: #f0e040; color: #1a1a00; border-color: #f0e040; font-weight: 700; }

/* level badge */
.level-badge {
  font-size: clamp(.5rem, 1.9vw, .65rem); letter-spacing: 2px; text-transform: uppercase;
  color: #6b6b80; background: #16161e; border: 1px solid #2a2a3a;
  border-radius: 100px; padding: 3px 13px; margin: 2px auto 6px;
  display: inline-block; flex-shrink: 0;
}

/* ---- TUBES AREA ---- */
#tubes-wrap {
  flex: 1 1 0;            /* takes all remaining vertical space */
  min-height: 0;
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 0 10px;
}
#tubes-container {
  display: flex; flex-wrap: wrap;
  justify-content: center; align-content: center;
  gap: 8px;
  width: 100%; height: 100%;
}

.tube {
  /* size set via JS css vars */
  width: var(--tw, 48px);
  height: var(--th, 160px);
  background: #16161e;
  border: 2px solid #2a2a3a;
  border-radius: 0 0 24px 24px; border-top: none;
  display: flex; flex-direction: column-reverse;
  overflow: hidden; cursor: pointer; position: relative;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: transform .15s ease, border-color .2s, box-shadow .2s;
}
.tube::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 5px; background: #2a2a3a; z-index: 2;
}
.tube:hover           { border-color: #444460; transform: translateY(-3px); }
.tube.selected        { border-color: #f0e040; box-shadow: 0 0 0 2px #f0e040, 0 0 18px rgba(240,224,64,.3); transform: translateY(-10px); }
.tube.done            { border-color: #40ff8c; box-shadow: 0 0 0 1px #40ff8c, 0 0 14px rgba(64,255,140,.25); animation: pulse 1s ease forwards; }
.tube.shake           { animation: shake .35s ease; }

.cblock {
  width: 100%; position: relative; flex-shrink: 0;
}
.cblock::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
}

/* ---- BOTTOM CONTROLS ---- */
.controls {
  width: 100%; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 4px 12px 6px;
}
.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-row button {
  font-family: 'Space Mono', monospace;
  font-size: clamp(.58rem, 2vw, .72rem); letter-spacing: 1px; text-transform: uppercase;
  padding: 10px 18px; border-radius: 8px; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: transform .1s, opacity .15s;
}
.btn-row button:active { transform: scale(.96); opacity: .8; }
.btn-primary   { background: #f0e040; color: #1a1a00; font-weight: 700; }
.btn-secondary { background: #16161e; color: #e8e8f0; border: 1px solid #2a2a3a !important; }
.btn-danger    { background: #2a1010; color: #ff6060; border: 1px solid #3a1515 !important; }

.hint {
  font-size: clamp(.5rem, 1.9vw, .62rem); color: #6b6b80;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ============================================================
   WIN OVERLAY
============================================================ */
#win-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(10,10,16,.92); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  animation: fadeIn .4s ease;
}
#win-overlay.hidden { display: none !important; }
.win-emoji { font-size: 3.5rem; margin-bottom: 12px; animation: pop .5s cubic-bezier(.34,1.56,.64,1) .1s both; }
.win-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 8vw, 3rem); font-weight: 900;
  background: linear-gradient(135deg, #f0e040, #40ff8c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: pop .5s cubic-bezier(.34,1.56,.64,1) .2s both;
}
.win-sub {
  color: #6b6b80; font-size: .75rem; letter-spacing: 2px; text-transform: uppercase;
  margin: 8px 0 24px;
  animation: pop .5s cubic-bezier(.34,1.56,.64,1) .3s both;
}
.win-btns {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  animation: pop .5s cubic-bezier(.34,1.56,.64,1) .4s both;
}
.win-btns button {
  font-family: 'Space Mono', monospace;
  font-size: .72rem; letter-spacing: 1px; text-transform: uppercase;
  padding: 11px 22px; border-radius: 8px; border: none;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: transform .1s;
}
.win-btns button:active { transform: scale(.96); }

/* ============================================================
   ANIMATIONS
============================================================ */
@keyframes slideUp  { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes pop      { from { opacity:0; transform:scale(.7); } to { opacity:1; transform:scale(1); } }
@keyframes shake    {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-7px); }
  40%     { transform:translateX(7px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
@keyframes pulse {
  0%   { transform:scale(1); }
  50%  { transform:scale(1.04) translateY(-3px); }
  100% { transform:scale(1); }
}
</style>
</head>
<body>

<!-- ==================== LANDING ==================== -->
<div id="screen-landing" class="screen">
  <a href="../index.html" class="btn-games-network">← Games Network</a>
  <div class="landing-logo">Color Sort</div>
  <div class="landing-sub">Sort the colors — tube by tube</div>

  <div class="preview-tubes">
    <div class="ptube">
      <div class="pblock" style="background:#ff4444"></div>
      <div class="pblock" style="background:#4488ff"></div>
      <div class="pblock" style="background:#ff4444"></div>
      <div class="pblock" style="background:#40c944"></div>
    </div>
    <div class="ptube">
      <div class="pblock" style="background:#f0e040"></div>
      <div class="pblock" style="background:#40c944"></div>
      <div class="pblock" style="background:#4488ff"></div>
      <div class="pblock" style="background:#f0e040"></div>
    </div>
    <div class="ptube">
      <div class="pblock" style="background:#40c944"></div>
      <div class="pblock" style="background:#ff4444"></div>
      <div class="pblock" style="background:#f0e040"></div>
      <div class="pblock" style="background:#4488ff"></div>
    </div>
    <div class="ptube" style="opacity:.22"></div>
  </div>

  <div class="land-diff" id="land-diff">
    <button data-d="easy">Easy</button>
    <button data-d="medium" class="active">Medium</button>
    <button data-d="hard">Hard</button>
  </div>

  <div class="land-btns">
    <button id="btn-start">▶ Start Game</button>
    <button id="btn-continue" style="display:none">► Continue</button>
  </div>

  <div class="how-to">
    <div class="how-step"><div class="icon">👆</div><p>Tap a tube to select</p></div>
    <div class="how-step"><div class="icon">🎯</div><p>Tap another to pour</p></div>
    <div class="how-step"><div class="icon">🏆</div><p>Sort all colors to win</p></div>
  </div>

  <div class="land-footer">
    &copy; 2025 Color Sort &nbsp;·&nbsp;
    <a href="pp.txt" target="_blank">Privacy Policy</a>
  </div>
</div>

<!-- ==================== GAME ==================== -->
<div id="screen-game" class="screen hidden">

  <div class="game-header">
    <div class="game-title">Color Sort</div>
    <button class="btn-menu" id="btn-menu">← Menu</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-moves">0</div><div class="stat-lbl">Moves</div></div>
    <div class="stat"><div class="stat-val" id="s-best">—</div><div class="stat-lbl">Best</div></div>
    <div class="stat"><div class="stat-val" id="s-time">0:00</div><div class="stat-lbl">Time</div></div>
  </div>

  <div class="diff-row" id="game-diff">
    <button data-d="easy">Easy</button>
    <button data-d="medium" class="active">Medium</button>
    <button data-d="hard">Hard</button>
  </div>

  <div class="level-badge" id="lbl-level">Level 1</div>

  <div id="tubes-wrap">
    <div id="tubes-container"></div>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button class="btn-primary"   id="btn-reshuffle">↺ Reshuffle</button>
      <button class="btn-secondary" id="btn-undo">↩ Undo</button>
      <button class="btn-danger"    id="btn-reset">Reset</button>
    </div>
    <div class="hint">Tap to select · tap again to pour</div>
  </div>
</div>

<!-- ==================== WIN OVERLAY ==================== -->
<div id="win-overlay" class="hidden">
  <div class="win-emoji">🎉</div>
  <div class="win-title">Sorted!</div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-btns">
    <button class="btn-primary"   id="btn-nextlvl"  style="background:#f0e040;color:#1a1a00;font-weight:700">Next Level →</button>
    <button class="btn-secondary" id="btn-winmenu" style="background:#16161e;color:#e8e8f0;border:1px solid #2a2a3a">Menu</button>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   CONSTANTS
============================================================ */
const CAP = 4;
const COLORS = {
  red:'#ff4444', orange:'#ff8c42', yellow:'#f0e040',
  green:'#40c944', teal:'#40e0d0', blue:'#4488ff',
  purple:'#cc44ff', pink:'#ff6bbd', lime:'#aaff40', sky:'#40c4ff'
};
const CKEYS = Object.keys(COLORS);
const DIFF_CFG = { easy:{n:4,e:2}, medium:{n:6,e:2}, hard:{n:9,e:2} };
const SAVE_KEY = 'cs_v1';

/* ============================================================
   STATE
============================================================ */
let tubes=[], sel=null, hist=[];
let moves=0, level=1, diff='medium';
let tSec=0, tRef=null;
let best={};

/* ============================================================
   PERSISTENCE
============================================================ */
function save() {
  if (level < 2) return;          // never save level 1
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({level, diff, best})); } catch(_){}
}
function load() {
  try { const r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; } catch(_){ return null; }
}
function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(_){}
}

/* ============================================================
   SCREEN MANAGEMENT  –  simple show/hide
============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goLanding() {
  stopTimer();
  refreshContinueBtn();
  showScreen('screen-landing');
}

function goGame() {
  showScreen('screen-game');
  // Wait one frame so the game screen is visible before measuring dimensions
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newGame();
    });
  });
}

/* ============================================================
   LANDING UI
============================================================ */
function refreshContinueBtn() {
  const p = load();
  const btn = document.getElementById('btn-continue');
  if (p && p.level > 1) {
    btn.style.display = 'inline-block';
    btn.textContent   = `► Continue  (Level ${p.level})`;
  } else {
    btn.style.display = 'none';
  }
}

// sync both diff selectors
function setDiff(d) {
  diff = d;
  document.querySelectorAll('[data-d]').forEach(b => {
    b.classList.toggle('active', b.dataset.d === d);
  });
}

// landing diff buttons
document.querySelectorAll('#land-diff [data-d]').forEach(b =>
  b.addEventListener('click', () => setDiff(b.dataset.d))
);

// start game (fresh)
document.getElementById('btn-start').addEventListener('click', () => {
  level = 1;
  moves = 0;
  best  = {};
  clearSave();
  goGame();
});

// continue
document.getElementById('btn-continue').addEventListener('click', () => {
  const p = load();
  if (p) { level=p.level; diff=p.diff||'medium'; best=p.best||{}; setDiff(diff); }
  moves = 0;
  goGame();
});

/* ============================================================
   GAME UI – DIFFICULTY BUTTONS
============================================================ */
document.querySelectorAll('#game-diff [data-d]').forEach(b =>
  b.addEventListener('click', () => {
    setDiff(b.dataset.d);
    level = 1; clearSave();
    newGame();
  })
);

/* ============================================================
   TUBE SIZING  –  called after screen is visible
============================================================ */
function sizeTubes(n) {
  const wrap  = document.getElementById('tubes-wrap');
  const avW   = wrap.clientWidth  - 20;          // minus padding
  const avH   = wrap.clientHeight - 16;
  const gap   = 8;

  let cols = n;
  let tw   = (avW - gap*(cols-1)) / cols;

  if (tw < 34) {
    cols = Math.ceil(n/2);
    tw   = (avW - gap*(cols-1)) / cols;
  }

  tw = Math.max(30, Math.min(tw, 70));
  const rows = Math.ceil(n / cols);
  let th = (avH - gap*(rows-1)) / rows;
  th = Math.max(100, Math.min(th, tw*4.2, 300));

  document.documentElement.style.setProperty('--tw', Math.floor(tw)+'px');
  document.documentElement.style.setProperty('--th', Math.floor(th)+'px');
}

window.addEventListener('resize', () => {
  if (!document.getElementById('screen-game').classList.contains('hidden')) {
    sizeTubes(tubes.length);
  }
});

/* ============================================================
   GAME CORE
============================================================ */
function newGame() {
  stopTimer();
  moves = 0; sel = null; hist = [];
  updateStats();

  const cfg = DIFF_CFG[diff];
  tubes = makePuzzle(cfg.n, cfg.e);

  sizeTubes(tubes.length);
  render();
  startTimer();

  document.getElementById('lbl-level').textContent = `Level ${level}`;
  save();
}

function makePuzzle(n, extra) {
  const pool = CKEYS.slice(0, n);
  let balls = [];
  pool.forEach(c => { for(let i=0;i<CAP;i++) balls.push(c); });
  for (let i=balls.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [balls[i],balls[j]]=[balls[j],balls[i]];
  }
  const t=[];
  for(let i=0;i<n;i++) t.push(balls.slice(i*CAP,(i+1)*CAP));
  for(let i=0;i<extra;i++) t.push([]);
  return t;
}

function render() {
  const wrap = document.getElementById('tubes-container');
  wrap.innerHTML = '';
  tubes.forEach((tube, idx) => {
    const el = document.createElement('div');
    el.className = 'tube';
    if (idx === sel)          el.classList.add('selected');
    if (isComplete(tube))     el.classList.add('done');

    tube.forEach(c => {
      const b = document.createElement('div');
      b.className = 'cblock';
      b.style.cssText = `height:${100/CAP}%;background:${COLORS[c]}`;
      el.appendChild(b);
    });

    el.addEventListener('click', () => tap(idx));
    wrap.appendChild(el);
  });
}

function tap(idx) {
  if (sel === null) {
    if (!tubes[idx].length) return;
    sel = idx; render(); return;
  }
  if (sel === idx) { sel=null; render(); return; }

  if (canPour(sel, idx)) {
    hist.push(tubes.map(t=>[...t]));
    if (hist.length > 60) hist.shift();
    pour(sel, idx);
    moves++;
    sel = null;
    updateStats();
    render();
    checkWin();
  } else {
    const old = sel; sel=null; render();
    const els = document.querySelectorAll('.tube');
    els[old].classList.add('shake');
    setTimeout(()=>els[old].classList.remove('shake'), 380);
  }
}

function canPour(f,t) {
  if (!tubes[f].length)            return false;
  if (tubes[t].length >= CAP)      return false;
  if (!tubes[t].length)            return true;
  return tubes[f].at(-1) === tubes[t].at(-1);
}

function pour(f,t) {
  const c = tubes[f].at(-1);
  while (tubes[f].length && tubes[t].length < CAP && tubes[f].at(-1)===c)
    tubes[t].push(tubes[f].pop());
}

function isComplete(tube) {
  return tube.length===CAP && tube.every(c=>c===tube[0]);
}

function checkWin() {
  if (tubes.filter(t=>t.length).every(isComplete)) {
    stopTimer();
    const k = `${diff}-${level}`;
    if (!best[k] || moves < best[k]) best[k]=moves;
    save();
    setTimeout(showWin, 380);
  }
}

/* ============================================================
   WIN OVERLAY
============================================================ */
function showWin() {
  document.getElementById('win-sub').textContent =
    `Level ${level} · ${moves} moves · ${fmt(tSec)}`;
  document.getElementById('win-overlay').classList.remove('hidden');
}
function hideWin() {
  document.getElementById('win-overlay').classList.add('hidden');
}

document.getElementById('btn-nextlvl').addEventListener('click', () => {
  hideWin(); level++; newGame();
});
document.getElementById('btn-winmenu').addEventListener('click', () => {
  hideWin(); goLanding();
});

/* ============================================================
   IN-GAME BUTTONS
============================================================ */
document.getElementById('btn-menu').addEventListener('click', goLanding);

document.getElementById('btn-reshuffle').addEventListener('click', newGame);

document.getElementById('btn-undo').addEventListener('click', () => {
  if (!hist.length) return;
  tubes = hist.pop(); sel=null; moves=Math.max(0,moves-1);
  updateStats(); render();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  level=1; clearSave(); newGame();
});

/* ============================================================
   TIMER
============================================================ */
function startTimer() {
  tSec=0; updateTime();
  tRef = setInterval(()=>{ tSec++; updateTime(); }, 1000);
}
function stopTimer() { clearInterval(tRef); tRef=null; }
function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updateTime() { document.getElementById('s-time').textContent=fmt(tSec); }

/* ============================================================
   STATS
============================================================ */
function updateStats() {
  document.getElementById('s-moves').textContent = moves;
  const k=`${diff}-${level}`;
  document.getElementById('s-best').textContent  = best[k] ?? '—';
}

/* ============================================================
   KEYBOARD
============================================================ */
document.addEventListener('keydown', e => {
  if (e.key==='z'||e.key==='Z') document.getElementById('btn-undo').click();
  if (e.key==='Escape') { sel=null; render(); }
});

/* ============================================================
   BOOT
============================================================ */
(function boot() {
  const p = load();
  if (p) {
    best = p.best || {};
    setDiff(p.diff || 'medium');
  }
  refreshContinueBtn();
  // Start on landing — game only starts when user taps a button
})();
</script>
</body>
