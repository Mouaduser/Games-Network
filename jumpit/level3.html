<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jump It — Level 3</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#e8f5f2;
      --ink:#0d2420;
      --mid:#5a8a82;
      --plat:#1a8a70;
      --platlt:#2abf9a;
      --gold:#c4922a;
      --red:#c9300a;
    }

    html, body {
      width:100%; height:100%; overflow:hidden; touch-action:none;
      -webkit-tap-highlight-color:transparent; user-select:none;
      background:var(--bg); font-family:'DM Sans',sans-serif;
    }

    .overlay {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:var(--bg); opacity:0; pointer-events:none;
      transition:opacity 0.4s ease; padding:24px;
    }
    .overlay.show { opacity:1; pointer-events:all; }

    .screen-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(52px,14vw,80px);
      letter-spacing:4px; color:var(--ink); text-align:center;
    }
    .screen-sub {
      font-size:10px; letter-spacing:3px; text-transform:uppercase;
      color:var(--mid); margin-top:6px; text-align:center;
    }
    .lbl {
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:var(--mid); margin-bottom:3px; margin-top:20px;
    }
    .big {
      font-family:'Bebas Neue',sans-serif;
      font-size:62px; letter-spacing:2px; color:var(--ink); line-height:1;
    }
    .new-rec {
      font-size:10px; letter-spacing:3px; text-transform:uppercase;
      color:var(--red); margin-top:4px; min-height:15px;
    }
    .stats-row { display:flex; gap:28px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
    .stat { text-align:center; }
    .stat-v { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:1px; color:var(--ink); }
    .stat-l { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--mid); }
    .btn-row { display:flex; gap:10px; margin-top:24px; flex-wrap:wrap; justify-content:center; }

    .cta {
      display:inline-block; background:var(--ink); color:var(--bg);
      border:none; padding:14px 40px;
      font-family:'DM Sans',sans-serif; font-weight:500;
      font-size:12px; letter-spacing:4px; text-transform:uppercase;
      cursor:pointer; border-radius:2px; text-decoration:none;
      -webkit-appearance:none; transition:transform 0.1s;
    }
    .cta:active { transform:scale(0.94); }
    .cta.teal { background:var(--plat); }

    .ghost {
      display:inline-block; background:transparent; color:var(--ink);
      border:1.5px solid rgba(13,36,32,0.22); padding:12px 24px;
      font-family:'DM Sans',sans-serif; font-size:10px;
      letter-spacing:3px; text-transform:uppercase;
      cursor:pointer; border-radius:2px; text-decoration:none;
      -webkit-appearance:none; transition:transform 0.1s;
    }
    .ghost:active { transform:scale(0.94); }

    .level-badge {
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:var(--plat); border:1px solid var(--plat);
      padding:4px 12px; border-radius:2px; margin-bottom:16px;
    }
    .win-stars { font-size:32px; letter-spacing:8px; margin:12px 0 4px; }
    .unlock-msg {
      margin-top:16px; padding:12px 20px;
      background:rgba(26,138,112,0.08);
      border:1px solid rgba(26,138,112,0.25);
      font-size:10px; letter-spacing:2px;
      color:var(--plat); text-transform:uppercase;
      text-align:center; border-radius:2px;
    }

    #hud {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:12px 16px; pointer-events:none; z-index:5;
    }
    .hv { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:2px; color:var(--ink); line-height:1; }
    .hl { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--mid); }
    .hr { text-align:right; }

    #goal-bar { position:fixed; bottom:0; left:0; right:0; height:4px; background:rgba(13,36,32,0.08); z-index:5; }
    #goal-fill { height:4px; background:var(--plat); width:0%; transition:width 0.3s; }
    #goal-label {
      position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
      font-size:9px; letter-spacing:2px; text-transform:uppercase;
      color:var(--mid); pointer-events:none; z-index:5; white-space:nowrap;
    }

    #tip {
      position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
      font-size:11px; letter-spacing:1px; color:var(--ink);
      background:rgba(232,245,242,0.94); border:1px solid rgba(26,138,112,0.22);
      padding:10px 18px; border-radius:3px; pointer-events:none; z-index:15;
      text-align:center; opacity:0; transition:opacity 0.4s; max-width:88vw;
    }
    #tip.on { opacity:1; }

    #toast {
      position:fixed; left:50%; top:30%; transform:translateX(-50%) scale(0.8);
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(40px,12vw,60px); letter-spacing:4px; color:var(--ink);
      pointer-events:none; z-index:20; opacity:0; white-space:nowrap;
    }

    #c { position:fixed; inset:0; width:100%; height:100%; z-index:1; }
    #tz-l, #tz-r { position:fixed; top:0; bottom:0; width:50%; z-index:6; cursor:pointer; }
    #tz-l { left:0; } #tz-r { right:0; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="tz-l"></div>
<div id="tz-r"></div>

<div id="hud">
    <div><div class="hv" id="hv-score">0</div><div class="hl">Height</div></div>
    <div class="hr"><div class="hv" id="hv-goal">—</div><div class="hl">Goal</div></div>
</div>

<div id="goal-bar"><div id="goal-fill"></div></div>
<div id="goal-label">Reach 4000m — don't wait on the glass!</div>
<div id="tip"></div>
<div id="toast"></div>

<!-- DEAD -->
<div class="overlay" id="s-dead">
    <div class="level-badge">Level 3 — Glass Floor</div>
    <div class="screen-title">You fell.</div>
    <div class="screen-sub">The glass won't hold — keep moving up!</div>
    <div class="lbl">Height reached</div>
    <div class="big" id="dd-score">0</div>
    <div class="new-rec" id="dd-rec"></div>
    <div class="stats-row">
        <div class="stat"><div class="stat-v" id="dd-pl">0</div><div class="stat-l">Platforms</div></div>
        <div class="stat"><div class="stat-v" id="dd-st">0</div><div class="stat-l">Stars</div></div>
    </div>
    <div class="btn-row">
        <a class="ghost" href="index.html">Menu</a>
        <button class="cta" id="btn-retry">Try Again</button>
    </div>
</div>

<!-- WIN -->
<div class="overlay" id="s-win">
    <div class="level-badge">Level 3 — Complete!</div>
    <div class="screen-title">You made it!</div>
    <div class="win-stars" id="win-stars">★★★</div>
    <div class="lbl">Final Height</div>
    <div class="big" id="wn-score">0</div>
    <div class="stats-row">
        <div class="stat"><div class="stat-v" id="wn-pl">0</div><div class="stat-l">Platforms</div></div>
        <div class="stat"><div class="stat-v" id="wn-st">0</div><div class="stat-l">Stars</div></div>
        <div class="stat"><div class="stat-v" id="wn-time">0</div><div class="stat-l">Seconds</div></div>
    </div>
    <div class="unlock-msg">🔓 Level 4 unlocked!</div>
    <div class="btn-row">
        <a class="ghost" href="index.html">Menu</a>
        <button class="cta" id="btn-replay">Play Again</button>
        <a class="cta teal" href="level4.html">Level 4 →</a>
    </div>
</div>

<script>
'use strict';

const GOAL = 4000;
const FADE_DELAY = 2000; // ms before platform disappears after landing

const store = {
  get(k,d){ try{ const v=localStorage.getItem('ji_'+k); return v!=null?JSON.parse(v):d; }catch{ return d; } },
  set(k,v){ try{ localStorage.setItem('ji_'+k,JSON.stringify(v)); }catch{} },
};
let BEST = store.get('lv3_best', 0);

// ── CANVAS ───────────────────────────────────────────────────────────────────
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0;
function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── PHYSICS — snappier than level 2, urgency to keep climbing ────────────────
const GRAV = 0.42;
const JVEL = -14.0;
const HSPD = 5.0;
const HACC = 0.70;

let G = null, RAF = null;

// ── INPUT ────────────────────────────────────────────────────────────────────
let moveDir = 0;
const tzL = document.getElementById('tz-l');
const tzR = document.getElementById('tz-r');
const touches = {};
function calcDir(){ const d=Object.values(touches); moveDir=d.length?d[d.length-1]:0; }
tzL.addEventListener('touchstart',e=>{ for(const t of e.changedTouches) touches[t.identifier]=-1; calcDir(); },{passive:true});
tzR.addEventListener('touchstart',e=>{ for(const t of e.changedTouches) touches[t.identifier]= 1; calcDir(); },{passive:true});
function tEnd(e){ for(const t of e.changedTouches) delete touches[t.identifier]; calcDir(); }
tzL.addEventListener('touchend',    tEnd,{passive:true});
tzR.addEventListener('touchend',    tEnd,{passive:true});
tzL.addEventListener('touchcancel', tEnd,{passive:true});
tzR.addEventListener('touchcancel', tEnd,{passive:true});
tzL.addEventListener('mousedown',()=>{ moveDir=-1; });
tzR.addEventListener('mousedown',()=>{ moveDir= 1; });
window.addEventListener('mouseup', ()=>{ moveDir=0; });
const K = {};
window.addEventListener('keydown',e=>{ K[e.code]=true; });
window.addEventListener('keyup',  e=>{ K[e.code]=false; });

// ── HELPERS ──────────────────────────────────────────────────────────────────
function rnd(a,b){ return a+Math.random()*(b-a); }

// Mobile-friendly: 12–18% screen width, shrinks slightly with height
function platW(){
  const shrink = Math.min(0.03, (G ? G.score : 0) / 60000);
  const lo = Math.max(W*0.10, W*0.12 - shrink*W);
  const hi = Math.max(W*0.13, W*0.18 - shrink*W);
  return rnd(lo, hi);
}

// Level 3: 75% fade, 25% normal — all glass!
function platType(){
  return Math.random() < 0.75 ? 'FADE' : 'NORM';
}

function mkPlat(x, y, w, type){
  return {
    x, y,
    w: w || platW(),
    h: 10,
    type: type || platType(),
    fadeAlpha: 1,
    _fading: false,
    _cracking: false, // visual crack stage
    landed: false,
  };
}

// ── TIPS ─────────────────────────────────────────────────────────────────────
const TIPS = [
  { atScore:0,   text:'Glass platforms disappear 2 seconds after landing!' },
  { atScore:15,  text:'Jump immediately — don\'t wait on the glass' },
  { atScore:60,  text:'Cracking glass = it\'s about to fall. Go!' },
  { atScore:200, text:'Normal (solid) platforms give you a short break' },
  { atScore:800, text:'Keep the momentum — you\'re doing great!' },
];
const shownTips = new Set();
let tipTimer = null;
function checkTips(score){
  TIPS.forEach((tip,i)=>{
    if(shownTips.has(i)||score<tip.atScore) return;
    shownTips.add(i);
    showTip(tip.text);
  });
}
function showTip(text){
  const el=document.getElementById('tip');
  el.textContent=text; el.classList.add('on');
  clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>el.classList.remove('on'),3200);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function initGame(){
  shownTips.clear();
  const startY = H * 0.65;
  G = {
    W, H,
    score:0, platCount:0, starCount:0,
    tick:0, alive:true, won:false,
    camY: startY - H*0.55,
    platforms:[], stars:[], particles:[],
    nextPlatY: startY,
    pl:{
      x:W/2-13, y:startY-36,
      vx:0, vy:0, w:26, h:34,
      onGround:false, sqT:0, squish:1, trail:[],
    },
  };
  // Solid starting platform
  G.platforms.push(mkPlat(W/2-W*0.14, startY, W*0.28, 'NORM'));
  for(let i=0; i<44; i++) seedPlat();
}

function seedPlat(){
  G.nextPlatY -= rnd(52, 76);
  const type = platType();
  const w    = platW();
  const x    = rnd(0, W-w);
  G.platforms.push(mkPlat(x, G.nextPlatY, w, type));
  if(Math.random()<0.28)
    G.stars.push({ x:x+w/2+rnd(-w*0.2,w*0.2), y:G.nextPlatY-24, r:7, bob:rnd(0,Math.PI*2), collected:false });
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function part(x,y,n,col,vs,life,r){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=rnd(1,3)*vs;
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life,ml:life,r:rnd(r*0.5,r),col});
  }
}
function pLand(pl,fade){ part(pl.x+pl.w/2,pl.y+pl.h, fade?10:5, fade?'rgba(26,191,154,0.7)':'rgba(13,36,32,0.5)', 1.4, 20, 3); }
function pCrack(p)     { part(p.x+p.w/2,p.y+p.h/2, 8,'rgba(26,138,112,0.5)',1.2,16,2); }
function pStar(x,y)    { part(x,y,12,'#c4922a',1.8,26,4); }
function pDie(pl)      { part(pl.x+pl.w/2,pl.y+pl.h/2,18,'#c9300a',2,45,5); }
function pWin(pl)      { part(pl.x+pl.w/2,pl.y+pl.h/2,28,'#1a8a70',2.5,60,5); }

// ── TOAST ────────────────────────────────────────────────────────────────────
let _tt=null;
function toast(txt){
  const el=document.getElementById('toast');
  el.textContent=txt;
  el.style.cssText='opacity:1;transform:translateX(-50%) scale(1.1);transition:none;';
  clearTimeout(_tt);
  _tt=setTimeout(()=>{ el.style.cssText='opacity:0;transform:translateX(-50%) scale(0.82);transition:opacity 0.35s,transform 0.35s;'; },80);
}

// ── LOOP ─────────────────────────────────────────────────────────────────────
function loop(){ update(); render(); if(G&&G.alive) RAF=requestAnimationFrame(loop); }

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(){
  if(!G||!G.alive) return;
  G.tick++;
  const pl = G.pl;

  const h = Math.floor(Math.max(0,-pl.y)/10);
  if(h>G.score) G.score=h;

  document.getElementById('goal-fill').style.width = Math.min(100,(G.score/GOAL)*100)+'%';
  document.getElementById('hv-score').textContent  = G.score;
  document.getElementById('hv-goal').textContent   = GOAL+'m';
  checkTips(G.score);

  if(G.score>=GOAL&&!G.won){ G.won=true; pWin(pl); setTimeout(showWin,600); }

  // Input
  let dir=moveDir;
  if(K['ArrowLeft']||K['KeyA']) dir=-1;
  if(K['ArrowRight']||K['KeyD']) dir= 1;
  if(dir!==0){ pl.vx+=dir*HACC; pl.vx=Math.max(-HSPD,Math.min(HSPD,pl.vx)); }
  else{ pl.vx*=0.80; if(Math.abs(pl.vx)<0.1) pl.vx=0; }

  // Physics
  pl.vy+=GRAV; pl.x+=pl.vx; pl.y+=pl.vy;
  if(pl.x+pl.w<0) pl.x=W; if(pl.x>W) pl.x=-pl.w;
  if(pl.sqT>0){ pl.sqT--; pl.squish=1+0.32*(pl.sqT/8); } else pl.squish=1;
  pl.trail.push({x:pl.x+pl.w/2,y:pl.y+pl.h/2});
  if(pl.trail.length>9) pl.trail.shift();

  // Collision — skip fully faded platforms
  pl.onGround=false;
  if(pl.vy>=0){
    for(const p of G.platforms){
      if(p._fading&&p.fadeAlpha<=0) continue;
      const foot=pl.y+pl.h, prev=foot-pl.vy;
      if(pl.x+pl.w-3>p.x&&pl.x+3<p.x+p.w&&foot>=p.y&&prev<=p.y+p.h+2){
        pl.y=p.y-pl.h; pl.onGround=true; pl.sqT=8; pl.squish=1.38;
        pl.vy=JVEL;
        if(!p.landed){
          p.landed=true; G.platCount++;
          pLand(pl, p.type==='FADE');
          if(p.type==='FADE'){
            // Start cracking immediately (visual)
            p._cracking=true;
            pCrack(p);
            // Start fading after FADE_DELAY
            setTimeout(()=>{ p._fading=true; }, FADE_DELAY);
          }
        }
        break;
      }
    }
  }

  // Fade out
  for(const p of G.platforms){
    if(p._fading) p.fadeAlpha=Math.max(0, p.fadeAlpha-0.025);
  }

  // Stars
  for(const s of G.stars){
    if(s.collected) continue;
    s.bob+=0.06;
    const sy=s.y+Math.sin(s.bob)*4;
    if(pl.x+pl.w>s.x-s.r&&pl.x<s.x+s.r&&pl.y+pl.h>sy-s.r&&pl.y<sy+s.r){
      s.collected=true; G.starCount++; G.score+=25; pStar(s.x,sy); toast('+25');
    }
  }

  // Camera
  const target=pl.y-H*0.42;
  if(target<G.camY) G.camY+=(target-G.camY)*0.1;

  // Spawn + cull
  while(G.nextPlatY>G.camY-80) seedPlat();
  G.platforms=G.platforms.filter(p=>p.y-G.camY<H+80);
  G.stars    =G.stars.filter(s=>s.y-G.camY<H+80);

  // Particles
  for(const p of G.particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--; }
  G.particles=G.particles.filter(p=>p.life>0);

  if(pl.y-G.camY>H+100&&!G.won){ pDie(pl); G.alive=false; setTimeout(showDead,700); }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  if(!G) return;
  cx.clearRect(0,0,W,H);

  // Background — teal-aqua tone
  const t=Math.min(1,G.score/4000);
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,lerpCol('#b8e8e0','#e8f5f2',t));
  bg.addColorStop(1,lerpCol('#e8f5f2','#f2faf8',t));
  cx.fillStyle=bg; cx.fillRect(0,0,W,H);

  // Dot grid
  const ds=30,off=((G.camY%ds)+ds)%ds;
  cx.fillStyle='rgba(13,36,32,0.04)';
  for(let gx=0;gx<W;gx+=ds)
    for(let gy=-off;gy<H+ds;gy+=ds)
      cx.fillRect(gx,gy,2,2);

  // Height markers every 500m
  for(let ht=0;ht<=GOAL+500;ht+=500){
    const sy=(-ht*10)-G.camY;
    if(sy<-10||sy>H+10) continue;
    const isGoal=ht===GOAL;
    cx.strokeStyle=isGoal?'rgba(26,138,112,0.45)':'rgba(13,36,32,0.06)';
    cx.lineWidth=isGoal?2:1; cx.setLineDash(isGoal?[]:[5,9]);
    cx.beginPath(); cx.moveTo(0,sy); cx.lineTo(W,sy); cx.stroke(); cx.setLineDash([]);
    cx.fillStyle=isGoal?'rgba(26,138,112,0.65)':'rgba(13,36,32,0.18)';
    cx.font=isGoal?'bold 10px "DM Sans",sans-serif':'9px "DM Sans",sans-serif';
    cx.textAlign='left';
    cx.fillText(isGoal?'🏁 GOAL 4000m':ht+'m',8,sy-4);
  }

  // Platforms
  for(const p of G.platforms){
    const sy=p.y-G.camY;
    if(sy<-24||sy>H+24) continue;
    const a=p._fading?p.fadeAlpha:1;
    if(a<=0) continue;

    const isFade=p.type==='FADE';

    // Shadow
    cx.globalAlpha=a*0.07; cx.fillStyle='#0d2420';
    rrect(cx,p.x+3,sy+5,p.w,p.h,5);

    if(isFade){
      // Glass look: translucent with border
      cx.globalAlpha=a*0.22; cx.fillStyle='#2abf9a';
      rrect(cx,p.x,sy,p.w,p.h,5);
      // Glass border
      cx.globalAlpha=a*0.7; cx.strokeStyle='#1a8a70'; cx.lineWidth=1.5;
      cx.beginPath();
      cx.roundRect?cx.roundRect(p.x,sy,p.w,p.h,5):rrectPath(cx,p.x,sy,p.w,p.h,5);
      cx.stroke();
      // Inner gleam
      cx.globalAlpha=a*0.35; cx.fillStyle='rgba(255,255,255,0.6)';
      rrect(cx,p.x+3,sy+1.5,p.w-6,3,3);
      // Cracking lines when landed
      if(p._cracking){
        cx.globalAlpha=a*0.55; cx.strokeStyle='#0d2420'; cx.lineWidth=0.8;
        cx.beginPath();
        cx.moveTo(p.x+p.w*0.3,sy); cx.lineTo(p.x+p.w*0.2,sy+p.h);
        cx.moveTo(p.x+p.w*0.6,sy); cx.lineTo(p.x+p.w*0.75,sy+p.h);
        cx.moveTo(p.x+p.w*0.5,sy); cx.lineTo(p.x+p.w*0.45,sy+p.h*0.6);
        cx.stroke();
      }
    } else {
      // Solid teal platform
      cx.globalAlpha=a; cx.fillStyle='#0d6050';
      rrect(cx,p.x,sy,p.w,p.h,5);
      cx.fillStyle='rgba(255,255,255,0.14)';
      rrect(cx,p.x+3,sy+1.5,p.w-6,3,3);
    }
    cx.globalAlpha=1;
  }

  // Stars
  for(const s of G.stars){
    if(s.collected) continue;
    const sy=s.y+Math.sin(s.bob)*4-G.camY;
    if(sy<-20||sy>H+20) continue;
    cx.globalAlpha=0.18; cx.fillStyle='#c4922a';
    cx.beginPath(); cx.arc(s.x,sy,s.r+5,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1; star5(cx,s.x,sy,s.r);
  }

  // Particles
  for(const p of G.particles){
    cx.globalAlpha=(p.life/p.ml)*0.85;
    cx.fillStyle=p.col||'#1a8a70';
    cx.beginPath(); cx.arc(p.x,p.y-G.camY,p.r,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;

  drawPlayer();

  cx.globalAlpha=0.05; cx.fillStyle='#0d2420';
  cx.font='bold 24px sans-serif'; cx.textAlign='center';
  cx.fillText('◂',W*0.1,H-22); cx.fillText('▸',W*0.9,H-22);
  cx.globalAlpha=1;
}

// ── PLAYER ───────────────────────────────────────────────────────────────────
function drawPlayer(){
  const pl=G.pl;
  pl.trail.forEach((t,i)=>{
    const f=i/pl.trail.length;
    cx.globalAlpha=f*0.05;
    const ts=26*(0.3+0.7*f);
    cx.fillStyle='#0d2420';
    cx.fillRect(t.x-ts/2,(t.y-ts/2)-G.camY,ts,ts*1.3);
  });
  cx.globalAlpha=1;

  const sq=pl.squish,sw=pl.w*(2-sq),sh=pl.h*sq;
  const px=pl.x-(sw-pl.w)/2,py=pl.y+(pl.h-sh)-G.camY;

  // Drop shadow
  let nearPY=py+sh+180;
  for(const p of G.platforms){
    const scy=p.y-G.camY;
    if(scy>py+sh&&scy<nearPY&&!(p._fading&&p.fadeAlpha<=0)&&pl.x+pl.w>p.x&&pl.x<p.x+p.w) nearPY=scy;
  }
  const shdist=Math.min(nearPY-(py+sh),180);
  cx.globalAlpha=0.10*(1-shdist/180);
  cx.fillStyle='#0d2420'; cx.fillRect(pl.x+5,nearPY,pl.w-10,3);
  cx.globalAlpha=1;

  cx.fillStyle='#0d2420'; cx.fillRect(px,py,sw,sh);
  cx.fillStyle='#e8f5f2'; cx.fillRect(px+sw*0.1,py+sh*0.07,sw*0.8,sh*0.54);
  const blink=(G.tick%80<3); cx.fillStyle='#0d2420';
  if(!blink){
    const eyeH=sh*(pl.vy<-2?0.08:0.15);
    cx.fillRect(px+sw*0.18,py+sh*0.17,sw*0.24,eyeH);
    cx.fillRect(px+sw*0.55,py+sh*0.17,sw*0.24,eyeH);
  } else {
    cx.fillRect(px+sw*0.18,py+sh*0.25,sw*0.24,sh*0.03);
    cx.fillRect(px+sw*0.55,py+sh*0.25,sw*0.24,sh*0.03);
  }
  cx.strokeStyle='#0d2420'; cx.lineWidth=1.8;
  if(pl.vy<-3)     { cx.beginPath(); cx.arc(px+sw*0.5,py+sh*0.49,sw*0.15,0,Math.PI*2); cx.stroke(); }
  else if(pl.vy>3) { cx.beginPath(); cx.arc(px+sw*0.5,py+sh*0.63,sw*0.17,Math.PI,Math.PI*2); cx.stroke(); }
  else             { cx.beginPath(); cx.arc(px+sw*0.5,py+sh*0.44,sw*0.17,0.1,Math.PI-0.1); cx.stroke(); }
  cx.fillStyle='#071410';
  if(pl.onGround&&Math.abs(pl.vx)>0.8){
    const lp=G.tick*0.28;
    cx.fillRect(px+sw*0.12,py+sh,sw*0.28,Math.abs(Math.sin(lp))*10+5);
    cx.fillRect(px+sw*0.54,py+sh,sw*0.28,Math.abs(Math.sin(lp+Math.PI))*10+5);
  } else {
    cx.fillRect(px+sw*0.12,py+sh,sw*0.28,pl.onGround?8:5);
    cx.fillRect(px+sw*0.54,py+sh,sw*0.28,pl.onGround?8:5);
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath(); c.fill();
}
function rrectPath(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}
function star5(c,cx2,cy2,r){
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2,rad=i%2===0?r:r*0.42;
    i===0?c.moveTo(cx2+Math.cos(a)*rad,cy2+Math.sin(a)*rad):c.lineTo(cx2+Math.cos(a)*rad,cy2+Math.sin(a)*rad);
  }
  c.closePath(); c.fillStyle='#c4922a'; c.fill();
}
function lerpCol(a,b,t){
  const ah=a.replace('#',''),bh=b.replace('#','');
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab2=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb=parseInt(bh.slice(4,6),16);
  return '#'+[ar+(br-ar)*t,ag+(bg-ag)*t,ab2+(bb-ab2)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function showDead(){
  document.getElementById('dd-score').textContent=G.score;
  document.getElementById('dd-pl').textContent=G.platCount;
  document.getElementById('dd-st').textContent=G.starCount;
  const isNew=G.score>BEST;
  if(isNew){ BEST=G.score; store.set('lv3_best',G.score); }
  document.getElementById('dd-rec').textContent=isNew?'✦ New Best!':'';
  document.getElementById('s-dead').classList.add('show');
}

function showWin(){
  G.alive=false; cancelAnimationFrame(RAF);
  const sc=G.score, secs=Math.floor(G.tick/60);
  const stars=secs<50?3:secs<110?2:1;
  document.getElementById('wn-score').textContent=sc;
  document.getElementById('wn-pl').textContent=G.platCount;
  document.getElementById('wn-st').textContent=G.starCount;
  document.getElementById('wn-time').textContent=secs;
  document.getElementById('win-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  if(sc>BEST){ BEST=sc; store.set('lv3_best',sc); }
  store.set('lv4_unlocked',true);
  document.getElementById('s-win').classList.add('show');
}

// ── START ────────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('s-dead').classList.remove('show');
  document.getElementById('s-win').classList.remove('show');
  document.getElementById('tip').classList.remove('on');
  Object.keys(touches).forEach(k=>delete touches[k]);
  moveDir=0; cancelAnimationFrame(RAF);
  initGame(); RAF=requestAnimationFrame(loop);
}

document.getElementById('btn-retry').addEventListener('click',startGame);
document.getElementById('btn-replay').addEventListener('click',startGame);
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

startGame();
</script>
