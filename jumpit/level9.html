<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jump It — Level 9</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#06060f;
      --ink:#e8eaf6;
      --mid:#5060a0;
      --plat:#304880;
      --platlt:#5080d0;
      --gold:#c4922a;
      --red:#ff4060;
    }

    html, body {
      width:100%; height:100%; overflow:hidden; touch-action:none;
      -webkit-tap-highlight-color:transparent; user-select:none;
      background:var(--bg); font-family:'DM Sans',sans-serif;
    }

    .overlay {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#06060f; opacity:0; pointer-events:none;
      transition:opacity 0.4s ease; padding:24px;
    }
    .overlay.show { opacity:1; pointer-events:all; }

    .screen-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(52px,14vw,80px);
      letter-spacing:4px; color:var(--ink); text-align:center;
    }
    .screen-sub {
      font-size:10px; letter-spacing:3px; text-transform:uppercase;
      color:var(--mid); margin-top:6px; text-align:center;
    }
    .lbl { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--mid); margin-bottom:3px; margin-top:20px; }
    .big { font-family:'Bebas Neue',sans-serif; font-size:62px; letter-spacing:2px; color:var(--ink); line-height:1; }
    .new-rec { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--red); margin-top:4px; min-height:15px; }
    .stats-row { display:flex; gap:28px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
    .stat { text-align:center; }
    .stat-v { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:1px; color:var(--ink); }
    .stat-l { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--mid); }
    .btn-row { display:flex; gap:10px; margin-top:24px; flex-wrap:wrap; justify-content:center; }

    .cta {
      display:inline-block; background:var(--platlt); color:#fff;
      border:none; padding:14px 40px;
      font-family:'DM Sans',sans-serif; font-weight:500;
      font-size:12px; letter-spacing:4px; text-transform:uppercase;
      cursor:pointer; border-radius:2px; text-decoration:none;
      -webkit-appearance:none; transition:transform 0.1s;
    }
    .cta:active { transform:scale(0.94); }
    .cta.dark { background:var(--plat); }

    .ghost {
      display:inline-block; background:transparent; color:var(--ink);
      border:1.5px solid rgba(232,234,246,0.2); padding:12px 24px;
      font-family:'DM Sans',sans-serif; font-size:10px;
      letter-spacing:3px; text-transform:uppercase;
      cursor:pointer; border-radius:2px; text-decoration:none;
      -webkit-appearance:none; transition:transform 0.1s;
    }
    .ghost:active { transform:scale(0.94); }

    .level-badge {
      font-size:9px; letter-spacing:3px; text-transform:uppercase;
      color:var(--platlt); border:1px solid var(--platlt);
      padding:4px 12px; border-radius:2px; margin-bottom:16px;
    }
    .win-stars { font-size:32px; letter-spacing:8px; margin:12px 0 4px; }
    .unlock-msg {
      margin-top:16px; padding:12px 20px;
      background:rgba(80,128,208,0.08); border:1px solid rgba(80,128,208,0.28);
      font-size:10px; letter-spacing:2px; color:var(--platlt);
      text-transform:uppercase; text-align:center; border-radius:2px;
    }

    #hud {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:12px 16px; pointer-events:none; z-index:5;
    }
    .hv { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:2px; color:var(--ink); line-height:1; }
    .hl { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--mid); }
    .hr { text-align:right; }

    #goal-bar { position:fixed; bottom:0; left:0; right:0; height:4px; background:rgba(232,234,246,0.05); z-index:5; }
    #goal-fill { height:4px; background:var(--platlt); width:0%; transition:width 0.3s; }
    #goal-label {
      position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
      font-size:9px; letter-spacing:2px; text-transform:uppercase;
      color:var(--mid); pointer-events:none; z-index:5; white-space:nowrap;
    }

    #tip {
      position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
      font-size:11px; letter-spacing:1px; color:var(--ink);
      background:rgba(6,6,15,0.95); border:1px solid rgba(80,128,208,0.3);
      padding:10px 18px; border-radius:3px; pointer-events:none; z-index:15;
      text-align:center; opacity:0; transition:opacity 0.4s; max-width:88vw;
    }
    #tip.on { opacity:1; }

    #toast {
      position:fixed; left:50%; top:30%; transform:translateX(-50%) scale(0.8);
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(40px,12vw,60px); letter-spacing:4px; color:var(--platlt);
      pointer-events:none; z-index:20; opacity:0; white-space:nowrap;
    }

    #c { position:fixed; inset:0; width:100%; height:100%; z-index:1; }
    #tz-l, #tz-r { position:fixed; top:0; bottom:0; width:50%; z-index:6; cursor:pointer; }
    #tz-l { left:0; } #tz-r { right:0; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="tz-l"></div>
<div id="tz-r"></div>

<div id="hud">
    <div><div class="hv" id="hv-score">0</div><div class="hl">Height</div></div>
    <div class="hr"><div class="hv" id="hv-goal">—</div><div class="hl">Goal</div></div>
</div>

<div id="goal-bar"><div id="goal-fill"></div></div>
<div id="goal-label">Reach 10000m — float to the stars!</div>
<div id="tip"></div>
<div id="toast"></div>

<!-- DEAD -->
<div class="overlay" id="s-dead">
    <div class="level-badge">Level 9 — Space Station</div>
    <div class="screen-title">Drifted off.</div>
    <div class="screen-sub">Low gravity — control your momentum!</div>
    <div class="lbl">Height reached</div>
    <div class="big" id="dd-score">0</div>
    <div class="new-rec" id="dd-rec"></div>
    <div class="stats-row">
        <div class="stat"><div class="stat-v" id="dd-pl">0</div><div class="stat-l">Platforms</div></div>
        <div class="stat"><div class="stat-v" id="dd-st">0</div><div class="stat-l">Stars</div></div>
    </div>
    <div class="btn-row">
        <a class="ghost" href="index.html">Menu</a>
        <button class="cta dark" id="btn-retry">Try Again</button>
    </div>
</div>

<!-- WIN -->
<div class="overlay" id="s-win">
    <div class="level-badge">Level 9 — Complete!</div>
    <div class="screen-title">You made it!</div>
    <div class="win-stars" id="win-stars">★★★</div>
    <div class="lbl">Final Height</div>
    <div class="big" id="wn-score">0</div>
    <div class="stats-row">
        <div class="stat"><div class="stat-v" id="wn-pl">0</div><div class="stat-l">Platforms</div></div>
        <div class="stat"><div class="stat-v" id="wn-st">0</div><div class="stat-l">Stars</div></div>
        <div class="stat"><div class="stat-v" id="wn-time">0</div><div class="stat-l">Seconds</div></div>
    </div>
    <div class="unlock-msg">🔓 Level 10 unlocked!</div>
    <div class="btn-row">
        <a class="ghost" href="index.html">Menu</a>
        <button class="cta dark" id="btn-replay">Play Again</button>
        <a class="cta" href="level10.html">Level 10 →</a>
    </div>
</div>

<script>
'use strict';

const GOAL = 10000;

// ── LOW GRAVITY PHYSICS ──────────────────────────────────────────────────────
const GRAV = 0.18;   // << low gravity
const JVEL = -9.0;   // << gentle jump
const HSPD = 4.2;
const HACC = 0.55;
const FRICTION = 0.92; // slight float in air too

const store = {
  get(k,d){ try{ const v=localStorage.getItem('ji_'+k); return v!=null?JSON.parse(v):d; }catch{ return d; } },
  set(k,v){ try{ localStorage.setItem('ji_'+k,JSON.stringify(v)); }catch{} },
};
let BEST = store.get('lv9_best',0);

const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W=0,H=0;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize();
window.addEventListener('resize',resize);

let G=null,RAF=null;

// ── STARS BACKGROUND ─────────────────────────────────────────────────────────
const BG_STARS = Array.from({length:200},()=>({
  x:Math.random(), y:Math.random()*3,   // spread over 3 screen heights
  r:Math.random()*1.4+0.2,
  bright:Math.random()*0.6+0.2,
  twinkle:Math.random()*Math.PI*2,
  speed:Math.random()*0.003+0.001,      // parallax depth
}));

// Nebula blobs (big soft glows)
const NEBULAE = Array.from({length:5},()=>({
  x:Math.random(), y:Math.random()*4,
  r:Math.floor(Math.random()*80)+60,
  col:[
    'rgba(80,40,160,0.06)',
    'rgba(40,80,180,0.05)',
    'rgba(160,40,100,0.05)',
    'rgba(40,160,120,0.04)',
    'rgba(80,60,200,0.06)',
  ][Math.floor(Math.random()*5)],
}));

// Distant planets (static decorative)
const PLANETS = [
  {x:0.18, y:0.22, r:18, col:'#3a2a60', ring:true},
  {x:0.80, y:0.55, r:10, col:'#2a4a28', ring:false},
];

// ── INPUT ────────────────────────────────────────────────────────────────────
let moveDir=0;
const tzL=document.getElementById('tz-l');
const tzR=document.getElementById('tz-r');
const touches={};
function calcDir(){ const d=Object.values(touches); moveDir=d.length?d[d.length-1]:0; }
tzL.addEventListener('touchstart',e=>{ for(const t of e.changedTouches) touches[t.identifier]=-1; calcDir(); },{passive:true});
tzR.addEventListener('touchstart',e=>{ for(const t of e.changedTouches) touches[t.identifier]= 1; calcDir(); },{passive:true});
function tEnd(e){ for(const t of e.changedTouches) delete touches[t.identifier]; calcDir(); }
tzL.addEventListener('touchend',    tEnd,{passive:true});
tzR.addEventListener('touchend',    tEnd,{passive:true});
tzL.addEventListener('touchcancel', tEnd,{passive:true});
tzR.addEventListener('touchcancel', tEnd,{passive:true});
tzL.addEventListener('mousedown',()=>{ moveDir=-1; });
tzR.addEventListener('mousedown',()=>{ moveDir= 1; });
window.addEventListener('mouseup', ()=>{ moveDir=0; });
const K={};
window.addEventListener('keydown',e=>{ K[e.code]=true; });
window.addEventListener('keyup',  e=>{ K[e.code]=false; });

function rnd(a,b){ return a+Math.random()*(b-a); }

// Mobile-friendly: 13–18% screen width
// Gaps are much larger in space (platforms far apart)
function platW(){
  const shrink=Math.min(0.03,(G?G.score:0)/100000);
  return rnd(Math.max(W*0.10,W*0.13-shrink*W), Math.max(W*0.13,W*0.18-shrink*W));
}

function mkPlat(x,y,w){
  // Space station panel look — random module colour
  const cols=['#304880','#283858','#3a3870','#284060'];
  return { x,y, w:w||platW(), h:10, landed:false,
    col:cols[Math.floor(Math.random()*cols.length)],
    lightOn: Math.random()<0.6,  // status light
    lightCol: ['#00ff9f','#ff4060','#ffe600'][Math.floor(Math.random()*3)],
  };
}

// ── TIPS ─────────────────────────────────────────────────────────────────────
const TIPS=[
  {atScore:0,   text:'Low gravity — you float much higher and slower!'},
  {atScore:20,  text:'Platforms are far apart — use horizontal momentum'},
  {atScore:100, text:'You can drift sideways a long way in space'},
  {atScore:500, text:'Spot the planets and nebulae as you rise'},
  {atScore:2000,text:'Incredible altitude — keep floating upward!'},
];
const shownTips=new Set(); let tipTimer=null;
function checkTips(score){
  TIPS.forEach((tip,i)=>{ if(shownTips.has(i)||score<tip.atScore) return; shownTips.add(i); showTip(tip.text); });
}
function showTip(text){
  const el=document.getElementById('tip');
  el.textContent=text; el.classList.add('on');
  clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>el.classList.remove('on'),3200);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function initGame(){
  shownTips.clear();
  const startY=H*0.65;
  G={
    W,H, score:0, platCount:0, starCount:0,
    tick:0, alive:true, won:false,
    camY:startY-H*0.55,
    platforms:[],stars:[],particles:[],
    nextPlatY:startY,
    pl:{x:W/2-13,y:startY-36,vx:0,vy:0,w:26,h:34,onGround:false,sqT:0,squish:1,trail:[]},
  };
  G.platforms.push(mkPlat(W/2-W*0.14,startY,W*0.28));
  for(let i=0;i<44;i++) seedPlat();
}

function seedPlat(){
  // Space: much larger gaps to reflect low gravity + long hang time
  G.nextPlatY -= rnd(100,160);
  const w=platW(), x=rnd(0,W-w);
  G.platforms.push(mkPlat(x,G.nextPlatY,w));
  // Stars are more plentiful in space
  if(Math.random()<0.35)
    G.stars.push({x:x+w/2+rnd(-w*0.3,w*0.3),y:G.nextPlatY-30,r:7,bob:rnd(0,Math.PI*2),collected:false});
}

// ── PARTICLES ────────────────────────────────────────────────────────────────
function part(x,y,n,col,vs,life,r){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=rnd(0.4,2)*vs;
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.6,life,ml:life,r:rnd(r*0.5,r),col});
  }
}
// Thruster sparks on landing
function pThrust(pl){
  part(pl.x+pl.w/2,pl.y+pl.h, 10,'rgba(80,128,208,0.8)',1.0,30,2.5);
  part(pl.x+pl.w/2,pl.y+pl.h,  4,'rgba(200,220,255,0.6)',0.6,22,1.5);
}
function pStar(x,y){ part(x,y,12,'#c4922a',1.4,28,4); }
function pDie(pl)  { part(pl.x+pl.w/2,pl.y+pl.h/2,16,'rgba(80,128,208,0.9)',1.5,50,4); }
function pWin(pl)  {
  ['#5080d0','#00ff9f','#ffe600','#ff4060','#b44fff'].forEach(c=>
    part(pl.x+pl.w/2,pl.y+pl.h/2,5,c,1.8,60,4));
}

let _tt=null;
function toast(txt){
  const el=document.getElementById('toast');
  el.textContent=txt;
  el.style.cssText='opacity:1;transform:translateX(-50%) scale(1.1);transition:none;';
  clearTimeout(_tt);
  _tt=setTimeout(()=>{ el.style.cssText='opacity:0;transform:translateX(-50%) scale(0.82);transition:opacity 0.35s,transform 0.35s;'; },80);
}

function loop(){ update(); render(); if(G&&G.alive) RAF=requestAnimationFrame(loop); }

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(){
  if(!G||!G.alive) return;
  G.tick++;
  const pl=G.pl;

  const h=Math.floor(Math.max(0,-pl.y)/10);
  if(h>G.score) G.score=h;

  document.getElementById('goal-fill').style.width=Math.min(100,(G.score/GOAL)*100)+'%';
  document.getElementById('hv-score').textContent=G.score;
  document.getElementById('hv-goal').textContent=GOAL+'m';
  checkTips(G.score);

  if(G.score>=GOAL&&!G.won){ G.won=true; pWin(pl); setTimeout(showWin,600); }

  let dir=moveDir;
  if(K['ArrowLeft']||K['KeyA']) dir=-1;
  if(K['ArrowRight']||K['KeyD']) dir= 1;
  if(dir!==0){ pl.vx+=dir*HACC; pl.vx=Math.max(-HSPD,Math.min(HSPD,pl.vx)); }
  else{
    // Floaty: same friction on ground and air
    pl.vx*=FRICTION;
    if(Math.abs(pl.vx)<0.04) pl.vx=0;
  }

  pl.vy+=GRAV;
  pl.x+=pl.vx; pl.y+=pl.vy;
  if(pl.x+pl.w<0) pl.x=W; if(pl.x>W) pl.x=-pl.w;
  if(pl.sqT>0){ pl.sqT--; pl.squish=1+0.28*(pl.sqT/8); } else pl.squish=1;
  pl.trail.push({x:pl.x+pl.w/2,y:pl.y+pl.h/2});
  if(pl.trail.length>20) pl.trail.shift(); // long floaty trail

  pl.onGround=false;
  if(pl.vy>=0){
    for(const p of G.platforms){
      const foot=pl.y+pl.h,prev=foot-pl.vy;
      if(pl.x+pl.w-3>p.x&&pl.x+3<p.x+p.w&&foot>=p.y&&prev<=p.y+p.h+2){
        pl.y=p.y-pl.h; pl.onGround=true; pl.sqT=6; pl.squish=1.24;
        pl.vy=JVEL;
        if(!p.landed){ p.landed=true; G.platCount++; pThrust(pl); }
        break;
      }
    }
  }

  for(const s of G.stars){
    if(s.collected) continue;
    s.bob+=0.04; // slower star bob in space
    const sy=s.y+Math.sin(s.bob)*5;
    if(pl.x+pl.w>s.x-s.r&&pl.x<s.x+s.r&&pl.y+pl.h>sy-s.r&&pl.y<sy+s.r){
      s.collected=true; G.starCount++; G.score+=25; pStar(s.x,sy); toast('+25');
    }
  }

  const target=pl.y-H*0.42;
  if(target<G.camY) G.camY+=(target-G.camY)*0.08; // slower camera follow = floaty feel

  while(G.nextPlatY>G.camY-120) seedPlat(); // bigger lookahead for large gaps
  G.platforms=G.platforms.filter(p=>p.y-G.camY<H+120);
  G.stars    =G.stars.filter(s=>s.y-G.camY<H+120);

  for(const p of G.particles){
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.04; // very slow particle gravity in space
    p.life--;
  }
  G.particles=G.particles.filter(p=>p.life>0);

  if(pl.y-G.camY>H+160&&!G.won){ pDie(pl); G.alive=false; setTimeout(showDead,700); }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  if(!G) return;
  cx.clearRect(0,0,W,H);

  // Deep space background
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020209');
  bg.addColorStop(0.5,'#06060f');
  bg.addColorStop(1,'#0a0818');
  cx.fillStyle=bg; cx.fillRect(0,0,W,H);

  // Nebulae (deep parallax)
  drawNebulae();

  // Star field
  drawStarField();

  // Planets
  drawPlanets();

  // Height markers
  for(let ht=0;ht<=GOAL+1000;ht+=1000){
    const sy=(-ht*10)-G.camY;
    if(sy<-10||sy>H+10) continue;
    const isGoal=ht===GOAL;
    cx.strokeStyle=isGoal?'rgba(80,128,208,0.5)':'rgba(255,255,255,0.04)';
    cx.lineWidth=isGoal?1.5:1; cx.setLineDash(isGoal?[]:[4,12]);
    cx.beginPath(); cx.moveTo(0,sy); cx.lineTo(W,sy); cx.stroke(); cx.setLineDash([]);
    cx.fillStyle=isGoal?'rgba(80,128,208,0.7)':'rgba(255,255,255,0.12)';
    cx.font=isGoal?'bold 10px "DM Sans",sans-serif':'9px "DM Sans",sans-serif';
    cx.textAlign='left';
    cx.fillText(isGoal?'🏁 GOAL 10000m':ht+'m',8,sy-4);
  }

  // Platforms — space station panels
  for(const p of G.platforms){
    const sy=p.y-G.camY;
    if(sy<-24||sy>H+24) continue;

    // Glow beneath panel
    cx.globalAlpha=0.10;
    cx.fillStyle=p.col;
    rrect(cx,p.x-4,sy-3,p.w+8,p.h+6,7);

    // Shadow
    cx.globalAlpha=0.15; cx.fillStyle='#000';
    rrect(cx,p.x+3,sy+5,p.w,p.h,5);

    // Panel body
    cx.globalAlpha=1; cx.fillStyle=p.col;
    rrect(cx,p.x,sy,p.w,p.h,4);

    // Panel lines (module detail)
    cx.strokeStyle='rgba(255,255,255,0.08)'; cx.lineWidth=0.8;
    cx.beginPath();
    cx.moveTo(p.x+p.w*0.33,sy); cx.lineTo(p.x+p.w*0.33,sy+p.h);
    cx.moveTo(p.x+p.w*0.66,sy); cx.lineTo(p.x+p.w*0.66,sy+p.h);
    cx.stroke();

    // Top highlight stripe
    cx.fillStyle='rgba(255,255,255,0.12)';
    rrect(cx,p.x+2,sy,p.w-4,2.5,2);

    // Status light (blinking)
    if(p.lightOn){
      const blink=(G.tick+Math.round(p.x))%60<30;
      cx.globalAlpha=blink?0.9:0.3;
      cx.fillStyle=p.lightCol;
      cx.beginPath(); cx.arc(p.x+p.w-6,sy+p.h/2,2.5,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1;
  }

  // Stars (collectible)
  for(const s of G.stars){
    if(s.collected) continue;
    const sy=s.y+Math.sin(s.bob)*5-G.camY;
    if(sy<-20||sy>H+20) continue;
    // Sparkle glow
    cx.globalAlpha=0.15+Math.sin(G.tick*0.05+s.bob)*0.08;
    cx.fillStyle='#ffe600';
    cx.beginPath(); cx.arc(s.x,sy,s.r+8,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1; star5(cx,s.x,sy,s.r,'#ffe600');
  }

  // Particles
  for(const p of G.particles){
    cx.globalAlpha=(p.life/p.ml)*0.85;
    cx.fillStyle=p.col||'#5080d0';
    cx.beginPath(); cx.arc(p.x,p.y-G.camY,p.r,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;

  drawPlayer();

  cx.globalAlpha=0.07; cx.fillStyle='#e8eaf6';
  cx.font='bold 24px sans-serif'; cx.textAlign='center';
  cx.fillText('◂',W*0.1,H-22); cx.fillText('▸',W*0.9,H-22);
  cx.globalAlpha=1;
}

// ── BACKGROUND ELEMENTS ──────────────────────────────────────────────────────
function drawNebulae(){
  NEBULAE.forEach(n=>{
    const nx=n.x*W;
    const ny=(n.y*H*2)-G.camY*0.04;
    cx.fillStyle=n.col;
    cx.beginPath(); cx.arc(nx,ny,n.r,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(nx+n.r*0.4,ny-n.r*0.3,n.r*0.7,0,Math.PI*2); cx.fill();
  });
}

function drawStarField(){
  BG_STARS.forEach(s=>{
    const bright=s.bright*0.7+Math.sin(G.tick*0.015+s.twinkle)*0.2;
    const sx=s.x*W;
    const sy=((s.y*H*3)-G.camY*s.speed)%(H*1.1);
    cx.globalAlpha=Math.max(0,Math.min(1,bright));
    cx.fillStyle='#ffffff';
    cx.beginPath(); cx.arc(sx,sy<0?sy+H:sy,s.r,0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;
}

function drawPlanets(){
  PLANETS.forEach(p=>{
    const px2=p.x*W;
    const py2=(p.y*H)-G.camY*0.02;
    if(py2<-p.r-40||py2>H+p.r+40) return;

    // Planet glow
    cx.globalAlpha=0.12;
    const grad=cx.createRadialGradient(px2,py2,p.r*0.5,px2,py2,p.r*2.5);
    grad.addColorStop(0,p.col); grad.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=grad; cx.beginPath(); cx.arc(px2,py2,p.r*2.5,0,Math.PI*2); cx.fill();

    cx.globalAlpha=1; cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(px2,py2,p.r,0,Math.PI*2); cx.fill();

    // Shading
    cx.globalAlpha=0.3; cx.fillStyle='rgba(0,0,0,0.5)';
    cx.beginPath(); cx.arc(px2+p.r*0.25,py2+p.r*0.2,p.r*0.85,0,Math.PI*2); cx.fill();

    // Ring
    if(p.ring){
      cx.globalAlpha=0.4; cx.strokeStyle='rgba(180,160,100,0.6)'; cx.lineWidth=2;
      cx.beginPath(); cx.ellipse(px2,py2,p.r*1.8,p.r*0.4,0.3,0,Math.PI*2); cx.stroke();
    }
    cx.globalAlpha=1;
  });
}

// ── PLAYER ───────────────────────────────────────────────────────────────────
function drawPlayer(){
  const pl=G.pl;

  // Long floaty trail
  pl.trail.forEach((t,i)=>{
    const f=i/pl.trail.length;
    cx.globalAlpha=f*0.07;
    const ts=26*(0.2+0.8*f);
    cx.fillStyle='#5080d0';
    cx.fillRect(t.x-ts/2,(t.y-ts/2)-G.camY,ts,ts*1.3);
  });
  cx.globalAlpha=1;

  const sq=pl.squish,sw=pl.w*(2-sq),sh=pl.h*sq;
  const px=pl.x-(sw-pl.w)/2,py=pl.y+(pl.h-sh)-G.camY;

  let nearPY=py+sh+250; // longer shadow lookahead for big gaps
  for(const p of G.platforms){
    const scy=p.y-G.camY;
    if(scy>py+sh&&scy<nearPY&&pl.x+pl.w>p.x&&pl.x<p.x+p.w) nearPY=scy;
  }
  const shdist=Math.min(nearPY-(py+sh),250);
  cx.globalAlpha=0.08*(1-shdist/250);
  cx.fillStyle='#5080d0'; cx.fillRect(pl.x+5,nearPY,pl.w-10,2);
  cx.globalAlpha=1;

  // Spacesuit — white with blue visor
  cx.fillStyle='#d8e8f8'; cx.fillRect(px,py,sw,sh);

  // Visor (darker face panel)
  cx.fillStyle='#1a2a4a'; cx.fillRect(px+sw*0.08,py+sh*0.05,sw*0.84,sh*0.52);
  // Visor gloss
  cx.globalAlpha=0.35; cx.fillStyle='rgba(100,180,255,0.5)';
  cx.fillRect(px+sw*0.12,py+sh*0.08,sw*0.30,sh*0.20);
  cx.globalAlpha=1;

  // Eyes through visor
  cx.fillStyle='rgba(0,240,180,0.9)'; // green HUD eyes
  const blink=(G.tick%100<4);
  if(!blink){
    const eyeH=sh*(pl.vy<-1?0.06:0.12);
    cx.fillRect(px+sw*0.20,py+sh*0.18,sw*0.22,eyeH);
    cx.fillRect(px+sw*0.55,py+sh*0.18,sw*0.22,eyeH);
  } else {
    cx.fillRect(px+sw*0.20,py+sh*0.24,sw*0.22,sh*0.03);
    cx.fillRect(px+sw*0.55,py+sh*0.24,sw*0.22,sh*0.03);
  }

  // Suit seam lines
  cx.strokeStyle='rgba(100,140,200,0.3)'; cx.lineWidth=0.8;
  cx.beginPath();
  cx.moveTo(px+sw*0.5,py+sh*0.55); cx.lineTo(px+sw*0.5,py+sh);
  cx.moveTo(px+sw*0.1,py+sh*0.65); cx.lineTo(px+sw*0.9,py+sh*0.65);
  cx.stroke();

  // Thruster legs
  cx.fillStyle='#304870';
  cx.fillRect(px+sw*0.12,py+sh,sw*0.30,pl.onGround?8:5);
  cx.fillRect(px+sw*0.56,py+sh,sw*0.30,pl.onGround?8:5);
  // Thruster nozzle glow when moving
  if(!pl.onGround&&pl.vy>0){
    cx.globalAlpha=0.5+Math.random()*0.3;
    cx.fillStyle='rgba(80,128,208,0.7)';
    cx.beginPath();
    cx.ellipse(px+sw*0.27,py+sh+(pl.onGround?10:6),sw*0.12,4,0,0,Math.PI*2);
    cx.fill();
    cx.beginPath();
    cx.ellipse(px+sw*0.71,py+sh+(pl.onGround?10:6),sw*0.12,4,0,0,Math.PI*2);
    cx.fill();
    cx.globalAlpha=1;
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath(); c.fill();
}
function star5(c,cx2,cy2,r,col){
  c.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2,rad=i%2===0?r:r*0.42;
    i===0?c.moveTo(cx2+Math.cos(a)*rad,cy2+Math.sin(a)*rad):c.lineTo(cx2+Math.cos(a)*rad,cy2+Math.sin(a)*rad);
  }
  c.closePath(); c.fillStyle=col||'#ffe600'; c.fill();
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function showDead(){
  document.getElementById('dd-score').textContent=G.score;
  document.getElementById('dd-pl').textContent=G.platCount;
  document.getElementById('dd-st').textContent=G.starCount;
  const isNew=G.score>BEST;
  if(isNew){ BEST=G.score; store.set('lv9_best',G.score); }
  document.getElementById('dd-rec').textContent=isNew?'✦ New Best!':'';
  document.getElementById('s-dead').classList.add('show');
}

function showWin(){
  G.alive=false; cancelAnimationFrame(RAF);
  const sc=G.score,secs=Math.floor(G.tick/60);
  const stars=secs<120?3:secs<250?2:1;
  document.getElementById('wn-score').textContent=sc;
  document.getElementById('wn-pl').textContent=G.platCount;
  document.getElementById('wn-st').textContent=G.starCount;
  document.getElementById('wn-time').textContent=secs;
  document.getElementById('win-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  if(sc>BEST){ BEST=sc; store.set('lv9_best',sc); }
  store.set('lv10_unlocked',true);
  document.getElementById('s-win').classList.add('show');
}

function startGame(){
  document.getElementById('s-dead').classList.remove('show');
  document.getElementById('s-win').classList.remove('show');
  document.getElementById('tip').classList.remove('on');
  Object.keys(touches).forEach(k=>delete touches[k]);
  moveDir=0; cancelAnimationFrame(RAF);
  initGame(); RAF=requestAnimationFrame(loop);
}

document.getElementById('btn-retry').addEventListener('click',startGame);
document.getElementById('btn-replay').addEventListener('click',startGame);
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

startGame();
</script>
