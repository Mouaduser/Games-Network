<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ═══════════════════════════════════════
       SEO META TAGS
  ═══════════════════════════════════════ -->
  <title>Games Network – Your Gaming Portal | Browser Games & Online Games</title>
  <meta name="description" content="Games Network: Discover hundreds of free browser games and online games. Action, Arcade, Racing and more – play instantly, no download required." />
  <meta name="keywords" content="Games Network, Browser Games, Online Games, Free Games, Arcade Games, Action Games, Gaming Portal, PC Games, Mobile Games" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="author" content="Games Network" />
  <meta name="language" content="en" />
  <link rel="canonical" href="https://gamesnetwork.gg/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Games Network" />
  <meta property="og:title"       content="Games Network – Your Gaming Portal" />
  <meta property="og:description" content="Hundreds of free browser games & online games. Play instantly – no download needed." />
  <meta property="og:url"         content="https://gamesnetwork.gg/" />
  <meta property="og:image"       content="https://gamesnetwork.gg/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height"content="630" />
  <meta property="og:locale"      content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@GamesNetwork" />
  <meta name="twitter:title"       content="Games Network – Your Gaming Portal" />
  <meta name="twitter:description" content="Hundreds of free browser games & online games. Play instantly, no download needed." />
  <meta name="twitter:image"       content="https://gamesnetwork.gg/og-image.jpg" />

  <!-- JSON-LD: WebSite + SearchAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Games Network",
    "alternateName": "GN",
    "url": "https://gamesnetwork.gg",
    "description": "Free browser games and online games portal",
    "inLanguage": "en",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://gamesnetwork.gg/search?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <!-- JSON-LD: ItemList (filled dynamically by JS) -->
  <script type="application/ld+json" id="gamesJsonLd"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       TOKENS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --accent:      #00f5c4;
      --accent-glow: rgba(0,245,196,0.18);
      --danger:      #ff3e6c;
      --warn:        #ffb300;

      --bg:          #f0f2f5;
      --bg2:         #ffffff;
      --header-bg:   rgba(240,242,245,0.92);
      --card-bg:     #ffffff;
      --text:        #111827;
      --text-muted:  #6b7280;
      --border:      #d1d5db;
      --grid-line:   rgba(0,0,0,0.04);
    }

    [data-theme="dark"] {
      --bg:          #08090d;
      --bg2:         #0f1118;
      --header-bg:   rgba(8,9,13,0.94);
      --card-bg:     #13151f;
      --text:        #e8eaf6;
      --text-muted:  #6b7a99;
      --border:      #1e2235;
      --grid-line:   rgba(0,245,196,0.025);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESET
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* animated bg grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      animation: bgScroll 28s linear infinite;
    }

    @keyframes bgScroll {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      user-select: none;
    }

    .logo-img {
      width: 48px; height: 48px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 8px;
      transition: transform 0.3s;
    }

    .logo:hover .logo-img { transform: scale(1.08) rotate(5deg); }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }

    .logo-name {
      font-weight: 900; font-size: 16px;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text);
    }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2.5px;
      color: var(--accent); text-transform: uppercase;
    }

    /* nav */
    .nav-right { display: flex; align-items: center; gap: 20px; }

    nav { display: flex; gap: 4px; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600; font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    nav a:hover, nav a.active { color: var(--accent); background: var(--accent-glow); }

    #theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }

    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       HERO
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hero {
      position: relative; z-index: 1;
      padding: 52px 5% 36px;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -80px; right: -60px;
      width: 520px; height: 420px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block; width: 28px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 900; letter-spacing: -0.5px;
      line-height: 1.05; margin-bottom: 10px;
    }

    h1 em { font-style: normal; color: var(--accent); }

    .hero-sub {
      color: var(--text-muted);
      font-size: 15px; font-weight: 500;
      white-space: nowrap;
      line-height: 1.6;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       FILTER BAR
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .toolbar {
      position: relative; z-index: 1;
      padding: 0 5% 24px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .filter-chip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 7px 16px; border-radius: 4px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .filter-chip:hover { color: var(--accent); border-color: rgba(0,245,196,0.4); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #08090d; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       MAIN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    main {
      position: relative; z-index: 1;
      flex: 1; padding: 0 5% 64px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       GAME GRID
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
      gap: 20px;
    }

    /* card */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
      animation: fadeUp 0.4s ease both;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 14px 48px rgba(0,245,196,0.1);
    }

    .game-card:hover .game-img   { transform: scale(1.06); }
    .game-card:hover .card-overlay{ opacity: 1; }
    .game-card:hover .play-icon  { opacity: 1; transform: translate(-50%,-50%) scale(1); }

    /* ── Thumbnail: enforces 516×516 aspect ratio ── */
    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;   /* 516:516 = 1:1 */
      overflow: hidden;
      background: var(--bg);
    }

    .game-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }

    /* overlay + play button */
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.48);
      opacity: 0; transition: opacity 0.28s;
    }

    .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0.7);
      width: 54px; height: 54px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.28s ease;
    }

    .play-icon svg { width: 20px; height: 20px; fill: #08090d; margin-left: 3px; }

    /* badge */
    .card-badge {
      position: absolute; top: 10px; left: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 3px;
    }

    .badge-new { background: var(--danger); color: #fff; }
    .badge-hot { background: var(--warn);   color: #111; }
    .badge-top { background: var(--accent); color: #111; }

    /* card body */
    .game-info { padding: 16px 18px 18px; }

    .game-genre {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 4px;
    }

    .game-title {
      font-size: 16px; font-weight: 900;
      letter-spacing: 0.4px; margin-bottom: 14px;
      line-height: 1.2;
    }

    .btn-play {
      display: block;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none; text-align: center;
      padding: 10px;
      border-radius: 5px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    .btn-play:hover { background: var(--accent); color: #08090d; }

    /* empty state */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 80px 20px; color: var(--text-muted); font-size: 15px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 24px 5%;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    .footer-brand {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 2px;
      color: var(--text-muted); text-transform: uppercase;
    }

    .footer-brand strong { color: var(--accent); }

    .footer-links { display: flex; gap: 20px; list-style: none; }

    .footer-links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       HAMBURGER MENU
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 6px;
      transition: border-color 0.2s;
    }

    .hamburger:hover { border-color: var(--accent); }
    .hamburger span {
      display: block; height: 2px;
      background: var(--text-muted);
      border-radius: 2px;
      transition: all 0.25s ease;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* Mobile nav drawer */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 64px; left: 0; right: 0;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 190;
      flex-direction: column;
      padding: 12px 4%;
      gap: 4px;
      animation: slideDown 0.2s ease;
    }

    .mobile-nav.open { display: flex; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .mobile-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600; font-size: 14px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 12px 16px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .mobile-nav a:hover, .mobile-nav a.active {
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       ANIMATION
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE — TABLET  (max 1024px)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 1024px) {
      .game-grid {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE — MOBILE  (max 768px)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 768px) {
      /* Header */
      header { padding: 0 4%; height: 58px; }
      nav { display: none; }          /* hide desktop nav */
      .hamburger { display: flex; }   /* show burger */

      /* Shrink theme toggle to icon-only */
      #theme-toggle { padding: 7px 10px; font-size: 10px; letter-spacing: 1px; }

      /* Hero */
      .hero { padding: 32px 4% 20px; }
      h1 { font-size: clamp(26px, 7vw, 38px); white-space: nowrap; }
      .hero-sub { font-size: 14px; max-width: 100%; }
      .hero-eyebrow { font-size: 10px; margin-bottom: 10px; }

      /* Filter bar – horizontally scrollable */
      .toolbar {
        padding: 0 4% 16px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .toolbar::-webkit-scrollbar { display: none; }
      .filter-chip { flex-shrink: 0; }

      /* Game grid: 2 columns on tablet portrait */
      .game-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      main { padding: 0 4% 48px; }

      /* Cards: touch-friendly tap target */
      .game-card:hover { transform: none; }  /* disable hover lift on touch */
      .btn-play { padding: 12px; font-size: 13px; }
      .game-info { padding: 12px 14px 14px; }
      .game-title { font-size: 14px; }
      .game-genre { font-size: 9px; }

      /* Footer */
      footer {
        padding: 20px 4%;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }
      .footer-links { flex-wrap: wrap; gap: 12px; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE — SMALL PHONE  (max 480px)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 480px) {
      /* Single column on small screens */
      .game-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      h1 { font-size: clamp(22px, 8vw, 32px); }

      /* Logo: hide subtitle text on very small screens */
      .logo-sub { display: none; }
      .logo-name { font-size: 14px; letter-spacing: 2px; }
      .logo-hex  { width: 32px; height: 32px; font-size: 11px; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       TOUCH DEVICE — disable hover effects
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (hover: none) {
      .game-card:hover { transform: none; box-shadow: none; border-color: var(--border); }
      .game-card:hover .game-img { transform: none; }
      .game-card:hover .card-overlay { opacity: 0; }
      .game-card:hover .play-icon { opacity: 0; }

      /* Always show play button on touch */

      <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Mobile nav drawer -->
  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile Navigation">
    <a href="#games" class="active" onclick="closeMobileNav()">Games</a>
    <a href="#" onclick="closeMobileNav()">Community</a>
    <a href="#" onclick="closeMobileNav()">News</a>
  </nav>

  <!-- ══════════════════════════════
       HERO
  ══════════════════════════════ -->
  <section class="hero" aria-labelledby="hero-heading">
    <div class="hero-eyebrow" aria-hidden="true">Games Network</div>
    <h1 id="hero-heading">Welcome back, <em>Player</em></h1>
    <p class="hero-sub">
      Discover hundreds of free browser games – play instantly in your browser, no download needed.
    </p>
  </section>

  <!-- ══════════════════════════════
       FILTER
  ══════════════════════════════ -->
  <div class="toolbar" role="group" aria-label="Game Filters" id="filterBar"></div>

  <!-- ══════════════════════════════
       GAMES
  ══════════════════════════════ -->
  <main id="games">
    <div class="game-grid" id="gameGrid" role="list" aria-label="Game Catalog"></div>
  </main>

  <!-- ══════════════════════════════
       FOOTER
  ══════════════════════════════ -->
  <footer role="contentinfo">
    <div class="footer-brand">
      <span>© 2025</span>
      <strong>Games Network</strong>
      <span>– All rights reserved</span>
    </div>
    <ul class="footer-links">
      <li><a href="#">Privacy Policy</a></li>
      <li><a href="#">Imprint</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </footer>

  <!-- ══════════════════════════════
       JAVASCRIPT
  ══════════════════════════════ -->
  <script>
    // ─────────────────────────────────────
    // GAME DATA
    // Images should be 516×516 px.
    // badge: "" | "new" | "hot" | "top"
    // ─────────────────────────────────────
    const games = [
      {
        title: "Jump IT",
        img:   "jumpit/Icon.png",
        genre: "Arcade",
        url:   "jumpit/index.html",
        badge: "new"
      },
      {
        title: "Pixel Breaker",
        img:   "pixelbreaker/Icon.png",
        genre: "Action",
        url:   "pixelbreaker/index.html",
        badge: "hot"
        badge: ""
      },
      {
        title: "Ball Quest",
        img:   "ballquest/Icon.png",
        genre: "Ball",
        url:   "ballquest/index.html",
        badge: ""
      },
      {
        title: "Color Sort Puzzle",
        img:   "colorsortpuzzle/Icon.png",
        genre: "Puzzle",
        url:   "colorsortpuzzle/index.html",
        badge: "top"
      },
      // ── Add a new game below: ──
      /*
      {
        title: "Game Title",
        img:   "folder/image-516x516.png",
        genre: "Adventure",
        url:   "folder/index.html",
        badge: ""
      },
      */
    ];

    // ─────────────────────────────────────
    // THEME
    // ─────────────────────────────────────
    const toggleBtn  = document.getElementById('theme-toggle');
    const themeLabel = document.getElementById('theme-label');
    const html       = document.documentElement;

    const applyTheme = (t) => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('gn-theme', t);
      themeLabel.textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
    };

    applyTheme(localStorage.getItem('gn-theme') || 'dark');
    toggleBtn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ─────────────────────────────────────
    // FILTER CHIPS
    // ─────────────────────────────────────
    const filterBar  = document.getElementById('filterBar');
    const genres     = ['All', ...new Set(games.map(g => g.genre))];
    let   active     = 'All';

    genres.forEach(genre => {
      const btn = document.createElement('button');
      btn.className  = `filter-chip${genre === 'All' ? ' active' : ''}`;
      btn.textContent = genre;
      btn.setAttribute('aria-label', `Filter: ${genre}`);
      btn.addEventListener('click', () => {
        active = genre;
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGames();
      });
      filterBar.appendChild(btn);
    });

    // ─────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────
    const grid    = document.getElementById('gameGrid');
    const SVG_PLAY = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`;

    function renderGames() {
      const list = active === 'All' ? games : games.filter(g => g.genre === active);
      grid.innerHTML = '';

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state" role="status">No games found in this category.</div>`;
        return;
      }

      list.forEach((game, i) => {
        const card = document.createElement('article');
        card.className = 'game-card';
        card.style.animationDelay = `${i * 0.06}s`;
        card.setAttribute('role', 'listitem');
        card.setAttribute('aria-label', `${game.title} – ${game.genre}`);

        card.innerHTML = `
          <div class="img-container">
            <img
              src="${game.img}"
              alt="${game.title} – ${game.genre} game preview"
              class="game-img"
              width="516"
              height="516"
              loading="lazy"
              decoding="async"
            />
            <div class="card-overlay" aria-hidden="true"></div>
            <div class="play-icon" aria-hidden="true">${SVG_PLAY}</div>
            ${game.badge ? `<span class="card-badge badge-${game.badge}">${game.badge}</span>` : ''}
          </div>
          <div class="game-info">
            <p class="game-genre">${game.genre}</p>
            <h2 class="game-title">${game.title}</h2>
            <a href="${game.url}" class="btn-play" aria-label="Play ${game.title}">Play Now</a>
          </div>`;

        grid.appendChild(card);
      });

      // Update JSON-LD
      document.getElementById('gamesJsonLd').textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "Game Catalog – Games Network",
        "numberOfItems": list.length,
        "itemListElement": list.map((g, idx) => ({
          "@type":    "ListItem",
          "position": idx + 1,
          "name":     g.title,
          "url":      `https://gamesnetwork.gg/${g.url}`,
          "image":    g.img.startsWith('http') ? g.img : `https://gamesnetwork.gg/${g.img}`
        }))
      });
    }

    // ─────────────────────────────────────
    // HAMBURGER MENU
    // ─────────────────────────────────────
    const hamburger  = document.getElementById('hamburger');
    const mobileNav  = document.getElementById('mobileNav');

    hamburger.addEventListener('click', () => {
      const isOpen = mobileNav.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
    });

    function closeMobileNav() {
      mobileNav.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
    }

    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !mobileNav.contains(e.target)) {
        closeMobileNav();
      }
    });

    // ─────────────────────────────────────
    // INIT
    // ─────────────────────────────────────
    renderGames();
  </script>
</body>
</html>
