<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gaming | Play Now</title>
    <style>
        /* CSS Styling */
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #0b0b0d;
            --card-bg: #1a1a1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(45deg, #0b0b0d, #1a1a1e);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Game Grid */
        .container {
            flex: 1;
            padding: 50px 5%;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #333;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        .game-img {
            width: 100%;
            height: 180px;
            background: #333;
            object-fit: cover;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .btn-play {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* Footer */
        footer {
            background: #000;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus Gaming</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Community</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Level Up Your Reality</h1>
        <p>Entdecke die neuesten Blockbuster und Indie-Highlights.</p>
    </section>

    <div class="container">
        <div class="game-grid" id="gameGrid">
            </div>
    </div>

    <footer>
        <p>&copy; 2026 Nexus Gaming Inc. | All rights reserved.</p>
    </footer>

    <script>
        // Datenbank der Spiele (Simuliert)
        const games = [
            {
                title: "Cyber Neon 2077",
                img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=500&q=80",
                genre: "RPG"
            },
            {
                title: "Galactic Wars",
                img: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?auto=format&fit=crop&w=500&q=80",
                genre: "Action"
            },
            {
                title: "Shadow Assassin",
                img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&w=500&q=80",
                genre: "Stealth"
            },
            {
                title: "Speed Demon",
                img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=500&q=80",
                genre: "Racing"
            }
        ];

        // Funktion zum Laden der Spiele
        function displayGames() {
            const grid = document.getElementById('gameGrid');
            
            games.forEach(game => {
                const card = `
                    <div class="game-card">
                        <img src="${game.img}" alt="${game.title}" class="game-img">
                        <div class="game-info">
                            <h3 class="game-title">${game.title}</h3>
                            <p>Genre: ${game.genre}</p>
                            <button class="btn-play">Jetzt Spielen</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Ausführen beim Laden
        window.onload = displayGames;
    </script>
</body>
</html>
