<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Gaming | Perfect UI</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #f8f9fa;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg: #0b0b0d;
            --header-bg: rgba(11, 11, 13, 0.95);
            --card-bg: #1a1a1e;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--header-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        #theme-toggle {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid var(--border);
        }

        .container { flex: 1; padding: 50px 5%; }

        .game-grid {
            display: grid;
            /* Wir gehen zurück zu einer flexiblen Breite, damit die Karten nebeneinander passen */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .game-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* DAS FIXIERT DEN LOOK */
        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Erzwingt ein perfektes Quadrat egal wie das Bild ist */
            overflow: hidden;
            background: #eee;
        }

        .game-img { 
            width: 100%;
            height: 100%;
            object-fit: cover; /* Füllt das Quadrat komplett aus ohne Balken */
            display: block;
        }

        .game-info { padding: 20px; }
        .game-title { margin: 0 0 5px 0; font-size: 1.2rem; font-weight: bold; }
        .game-genre { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px; text-transform: uppercase; }

        .btn-play {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-play:hover { background: #0056b3; }

        footer { padding: 30px; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aurora</div>
        <div class="nav-container">
            <nav>
                <a href="jumpit/index.html">Store</a>
                <a href="#">Community</a>
            </nav>
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </header>

    <section class="hero">
        <h1>Unlock New Worlds</h1>
    </section>

    <div class="container">
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Aurora Gaming</p>
    </footer>

    <script>
        const games = [
            { title: "Jump IT", img: "jumpit/Icon.png", genre: "Arcade" },
            { title: "Galactic Wars", img: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?w=600", genre: "Action" },
            { title: "Shadow Assassin", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=600", genre: "Stealth" },
            { title: "Speed Demon", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600", genre: "Racing" }
        ];

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggleBtn.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        }

        if (localStorage.getItem('theme') === 'dark') setTheme('dark');

        toggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            setTheme(isDark ? 'light' : 'dark');
        });

        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            grid.innerHTML += `
                <div class="game-card">
                    <div class="img-container">
                        <img src="${game.img}" class="game-img" alt="${game.title}">
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-genre">${game.genre}</p>
                        <button class="btn-play">Play Now</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
