<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Gaming | Fixed Icon Size</title>
    <style>
        /* CSS Variables */
        :root {
            --primary: #007bff;
            --bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #f8f9fa;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg: #0b0b0d;
            --header-bg: rgba(11, 11, 13, 0.95);
            --card-bg: #1a1a1e;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--header-bg);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #theme-toggle {
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid var(--border);
        }

        .container { flex: 1; padding: 50px 5%; }

        .game-grid {
            display: grid;
            /* Grid passt sich wieder normal an */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center; /* Zentriert das Icon in der Karte */
        }

        .game-card:hover { transform: translateY(-5px); }

        /* NUR DAS ICON FORMAT 516x516 */
        .game-img { 
            width: 516px; 
            height: 516px; 
            object-fit: cover; 
            display: block;
            /* Sorgt dafür, dass es auf kleinen Handys nicht über den Bildschirm ragt */
            max-width: 100%; 
        }

        .game-info { 
            padding: 20px; 
            width: 100%; 
            box-sizing: border-box; 
        }

        .game-title { margin: 0 0 5px 0; color: var(--text); }
        .game-genre { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px; }

        .btn-play {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        footer {
            padding: 30px;
            text-align: center;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Aurora</div>
        <div class="nav-container">
            <nav>
                <a href="jumpit/index.html" style="color: var(--text); text-decoration: none; margin-right: 15px;">Store</a>
                <a href="#" style="color: var(--text); text-decoration: none;">Community</a>
            </nav>
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </header>

    <section class="hero">
        <h1>Unlock New Worlds</h1>
        <p>Premium gaming experiences at your fingertips.</p>
    </section>

    <div class="container">
        <div class="game-grid" id="gameGrid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Aurora Gaming Platform</p>
    </footer>

    <script>
        const games = [
            { title: "Jump IT", img: "jumpit/Icon.png", genre: "RPG" },
            { title: "Galactic Wars", img: "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?w=600", genre: "Action" },
            { title: "Shadow Assassin", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=600", genre: "Stealth" },
            { title: "Speed Demon", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600", genre: "Racing" }
        ];

        const toggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.textContent = 'Light Mode';
        }

        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleBtn.textContent = 'Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.textContent = 'Light Mode';
            }
        });

        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            grid.innerHTML += `
                <div class="game-card">
                    <img src="${game.img}" class="game-img" alt="${game.title}">
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-genre">${game.genre}</p>
                        <button class="btn-play">Play Now</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
