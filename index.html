<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- JSON-LD: WebSite + SearchAction -->
  <script type="application/ld+json">

    "@context": "https://schema.org",

  <!-- JSON-LD: ItemList (filled dynamically by JS) -->
  <script type="application/ld+json" id="gamesJsonLd"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       TOKENS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --accent:      #00f5c4;
      --accent-glow: rgba(0,245,196,0.18);
      --danger:      #ff3e6c;
      --warn:        #ffb300;

      --bg:          #f0f2f5;
      --bg2:         #ffffff;
      --header-bg:   rgba(240,242,245,0.92);
      --card-bg:     #ffffff;
      --text:        #111827;
      --text-muted:  #6b7280;
      --border:      #d1d5db;
      --grid-line:   rgba(0,0,0,0.04);
    }

    [data-theme="dark"] {
      --bg:          #08090d;
      --bg2:         #0f1118;
      --header-bg:   rgba(8,9,13,0.94);
      --card-bg:     #13151f;
      --text:        #e8eaf6;
      --text-muted:  #6b7a99;
      --border:      #1e2235;
      --grid-line:   rgba(0,245,196,0.025);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESET
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* animated bg grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      animation: bgScroll 28s linear infinite;
    }

    @keyframes bgScroll {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      user-select: none;
    }

    .logo-hex {
      width: 38px; height: 38px;
      background: var(--accent);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; font-weight: 900;
      color: #08090d;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    .logo:hover .logo-hex { transform: rotate(30deg); }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }

    .logo-name {
      font-weight: 900; font-size: 16px;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text);
    }

    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2.5px;
      color: var(--accent); text-transform: uppercase;
    }

    /* nav */
    .nav-right { display: flex; align-items: center; gap: 20px; }

    nav { display: flex; gap: 4px; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600; font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 6px 14px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    nav a:hover, nav a.active { color: var(--accent); background: var(--accent-glow); }

    #theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }

    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       HERO
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hero {
      position: relative; z-index: 1;
      padding: 52px 5% 36px;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: -80px; right: -60px;
      width: 520px; height: 420px;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 14px;
    }

    .hero-eyebrow::before {
      content: '';
      display: block; width: 28px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 900; letter-spacing: -0.5px;
      line-height: 1.05; margin-bottom: 10px;
    }

    h1 em { font-style: normal; color: var(--accent); }

    .hero-sub {
      color: var(--text-muted);
      font-size: 15px; font-weight: 500;
      max-width: 460px; line-height: 1.6;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       FILTER BAR
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .toolbar {
      position: relative; z-index: 1;
      padding: 0 5% 24px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .filter-chip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 7px 16px; border-radius: 4px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .filter-chip:hover { color: var(--accent); border-color: rgba(0,245,196,0.4); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #08090d; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       MAIN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    main {
      position: relative; z-index: 1;
      flex: 1; padding: 0 5% 64px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       GAME GRID
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
      gap: 20px;
    }

    /* card */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
      animation: fadeUp 0.4s ease both;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 14px 48px rgba(0,245,196,0.1);
    }

    .game-card:hover .game-img   { transform: scale(1.06); }
    .game-card:hover .card-overlay{ opacity: 1; }
    .game-card:hover .play-icon  { opacity: 1; transform: translate(-50%,-50%) scale(1); }

    /* ── Thumbnail: enforces 516×516 aspect ratio ── */
    .img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;   /* 516:516 = 1:1 */
      overflow: hidden;
      background: var(--bg);
    }

    .game-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.4s ease;
    }

    /* overlay + play button */
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.48);
      opacity: 0; transition: opacity 0.28s;
    }

    .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0.7);
      width: 54px; height: 54px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.28s ease;
    }

    .play-icon svg { width: 20px; height: 20px; fill: #08090d; margin-left: 3px; }

    /* badge */
    .card-badge {
      position: absolute; top: 10px; left: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 3px;
    }

    .badge-new { background: var(--danger); color: #fff; }
    .badge-hot { background: var(--warn);   color: #111; }
    .badge-top { background: var(--accent); color: #111; }

    /* card body */
    .game-info { padding: 16px 18px 18px; }

    .game-genre {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 4px;
    }

    .game-title {
      font-size: 16px; font-weight: 900;
      letter-spacing: 0.4px; margin-bottom: 14px;
      line-height: 1.2;
    }

    .btn-play {
      display: block;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      text-decoration: none; text-align: center;
      padding: 10px;
      border-radius: 5px;
      font-family: 'Exo 2', sans-serif;
      font-weight: 700; font-size: 12px;
      letter-spacing: 2px; text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    .btn-play:hover { background: var(--accent); color: #08090d; }

    /* empty state */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 80px 20px; color: var(--text-muted); font-size: 15px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 24px 5%;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }

    .footer-brand {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 2px;
      color: var(--text-muted); text-transform: uppercase;
    }

    .footer-brand strong { color: var(--accent); }

    .footer-links { display: flex; gap: 20px; list-style: none; }

    .footer-links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       ANIMATION
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 640px) {
      header { padding: 0 4%; }
      nav { display: none; }
      .hero  { padding: 36px 4% 20px; }
      .toolbar { padding: 0 4% 18px; }
      main   { padding: 0 4% 48px; }
      footer { padding: 20px 4%; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════
       HEADER
  ══════════════════════════════ -->
  <header role="banner">
    <a href="/" class="logo" aria-label="Games Network – Startseite">
      <div class="logo-hex" aria-hidden="true">GN</div>

    <div class="nav-right">
      <nav role="navigation" aria-label="Hauptnavigation">
        <a href="#games" class="active">Spiele</a>

  <!-- ══════════════════════════════
       HERO
  ══════════════════════════════ -->
  <section class="hero" aria-labelledby="hero-heading">
    <div class="hero-eyebrow" aria-hidden="true">Games Network</div>
    <h1 id="hero-heading">Willkommen zurück,<br><em>Spieler</em></h1>
    <p class="hero-sub">
      Entdecke hunderte kostenlose Browser-Games – direkt im Browser spielen, kein Download nötig.
    </p>

  <!-- ══════════════════════════════

  ══════════════════════════════ -->

  <!-- ══════════════════════════════

  <main id="games">
    <div class="game-grid" id="gameGrid" role="list" aria-label="Spielekatalog"></div>

  <!-- ══════════════════════════════

  <!-- ══════════════════════════════
       JAVASCRIPT
  ══════════════════════════════ -->
  <script>
    // ─────────────────────────────────────
    // GAME DATA
    // Bilder sollten 516×516 px sein.
    // badge: "" | "new" | "hot" | "top"
    // ─────────────────────────────────────
    const games = [
      {
        title: "Jump IT",
        img:   "jumpit/Icon.png",
        genre: "Arcade",
        url:   "jumpit/index.html",
        badge: "new"
      },
      {
        title: "Galactic Wars",
        img:   "https://images.unsplash.com/photo-1614732414444-096e5f1122d5?w=516&h=516&fit=crop",
        genre: "Action",
        url:   "games/galactic.html",
        badge: "hot"
      },
      {
        title: "Shadow Assassin",
        img:   "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=516&h=516&fit=crop",
        genre: "Stealth",
        url:   "games/shadow.html",
        badge: ""
      },
      {
        title: "Speed Demon",
        img:   "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=516&h=516&fit=crop",
        genre: "Racing",
        url:   "games/speed.html",
        badge: "top"
      },
      // ── Neues Spiel hinzufügen: ──
      /*
      {
        title: "Spielname",
        img:   "ordner/bild-516x516.png",
        genre: "Adventure",
        url:   "ordner/index.html",
        badge: ""
      },
      */
    ];

    // ─────────────────────────────────────
    // THEME
    // ─────────────────────────────────────
    const toggleBtn  = document.getElementById('theme-toggle');
    const themeIcon  = document.getElementById('theme-icon');
    const themeLabel = document.getElementById('theme-label');
    const html       = document.documentElement;

    const applyTheme = (t) => {
      html.setAttribute('data-theme', t);
      localStorage.setItem('gn-theme', t);
      themeIcon.textContent  = t === 'dark' ? '☀️' : '🌙';
      themeLabel.textContent = t === 'dark' ? 'Hell' : 'Dunkel';
    };

    applyTheme(localStorage.getItem('gn-theme') || 'dark');
    toggleBtn.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ─────────────────────────────────────
    // FILTER CHIPS
    // ─────────────────────────────────────
    const filterBar  = document.getElementById('filterBar');
    const genres     = ['Alle', ...new Set(games.map(g => g.genre))];
    let   active     = 'Alle';

    genres.forEach(genre => {
      const btn = document.createElement('button');
      btn.className  = `filter-chip${genre === 'Alle' ? ' active' : ''}`;
      btn.textContent = genre;
      btn.setAttribute('aria-label', `Filter: ${genre}`);
      btn.addEventListener('click', () => {
        active = genre;
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGames();
      });
      filterBar.appendChild(btn);
    });

    // ─────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────
    const grid    = document.getElementById('gameGrid');
    const SVG_PLAY = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>`;

    function renderGames() {
      const list = active === 'Alle' ? games : games.filter(g => g.genre === active);
      grid.innerHTML = '';

      if (!list.length) {
        grid.innerHTML = `<div class="empty-state" role="status">Keine Spiele in dieser Kategorie.</div>`;
        return;
      }

      list.forEach((game, i) => {
        const card = document.createElement('article');
        card.className = 'game-card';
        card.style.animationDelay = `${i * 0.06}s`;
        card.setAttribute('role', 'listitem');
        card.setAttribute('aria-label', `${game.title} – ${game.genre}`);

        card.innerHTML = `
          <div class="img-container">
            <img
              src="${game.img}"
              alt="${game.title} – ${game.genre} Spielvorschau"
              class="game-img"
              width="516"
              height="516"
              loading="lazy"
              decoding="async"
            />
            <div class="card-overlay" aria-hidden="true"></div>
            <div class="play-icon" aria-hidden="true">${SVG_PLAY}</div>
            ${game.badge ? `<span class="card-badge badge-${game.badge}">${game.badge}</span>` : ''}
          </div>
          <div class="game-info">
            <p class="game-genre">${game.genre}</p>
            <h2 class="game-title">${game.title}</h2>
            <a href="${game.url}" class="btn-play" aria-label="${game.title} spielen">Jetzt spielen</a>
          </div>`;

        grid.appendChild(card);
      });

      // Update JSON-LD
      document.getElementById('gamesJsonLd').textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "Spielekatalog – Games Network",
        "numberOfItems": list.length,
        "itemListElement": list.map((g, idx) => ({
          "@type":    "ListItem",
          "position": idx + 1,
          "name":     g.title,
          "url":      `https://gamesnetwork.de/${g.url}`,
          "image":    g.img.startsWith('http') ? g.img : `https://gamesnetwork.de/${g.img}`
        }))
      });
    }

    renderGames();
  </script>
</body>
</html>
